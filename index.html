<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366">
<title>Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaed;
    --border: rgba(0,0,0,0.1);
    --text: #1a1c22;
    --muted: #7a7f90;
    --dim: #9098a8;
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,0.1);
    --coral: #e05c2a;
    --red: #dc2626;
    --green: #16a34a;

    /* Red Sox Navy / Red */
    --sox-navy: #0d2b56;
    --sox-red: #bd3039;
    --sox-alt: #c8102e; /* alternate red (the darker official alt) */
    --sox-gold: #e8b84b;
  }

  html.dark-mode {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --text: #e2e5f0;
    --muted: #565c72;
    --dim: #363c50;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --coral: #f5875a;
    --red: #f06060;
    --green: #5dca7a;
  }
  html.dark-mode .clock,
  html.dark-mode .clock-sub { color: #e2e5f0; }

  #screensaver {
    display: none; position: fixed; inset: 0; background: #000; z-index: 999;
    align-items: center; justify-content: center; flex-direction: column; gap: 8px; cursor: pointer;
  }
  #screensaver.active { display: flex; }
  #ss-clock { font-family: 'DM Mono', monospace; font-size: 12vw; font-weight: 300; color: rgba(255,255,255,0.15); letter-spacing: -4px; line-height: 1; }
  #ss-date { font-family: 'DM Mono', monospace; font-size: 2vw; color: rgba(255,255,255,0.08); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 14px; line-height: 1.4; }

  .screen { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr; padding: 0.7vw 1.4vw 0.6vw; gap: 0.5vh; }

  .topbar { display: grid; grid-template-columns: 1fr auto; align-items: center; }
  .clock-block { display: flex; align-items: baseline; gap: 0.8vw; }
  .clock { font-family: 'DM Mono', monospace; font-size: 1.3vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .clock-sub { font-family: 'DM Mono', monospace; font-size: 1.3vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .refresh-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.72vw; padding: 0.2vw 0.6vw; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.2s; }
  .refresh-btn:hover { color: var(--text); }

  .main { display: grid; grid-template-columns: 5fr 1fr; gap: 0.8vw; min-height: 0; min-width: 0; }
  .col { display: flex; flex-direction: column; gap: 0.8vw; min-height: 0; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 0.8vw; padding: 0.9vw 1vw; overflow: hidden; }
  .card-title { font-size: 0.8vw; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7vw; }

  /* CALENDAR */
  .cal-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 0.8vw;
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
    overflow: hidden;
  }
  .cal-iframe-wrap { flex: 1; min-height: 0; overflow: hidden; }
  .cal-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ===================== WEATHER WIDGET ===================== */
  .wx-card {
    flex: 1;
    border-radius: 0.8vw;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border: 0.5px solid rgba(255,255,255,0.18);
    background: linear-gradient(160deg, #1a3a5c 0%, #1e4a7a 35%, #2a5fa0 65%, #1b3a62 100%);
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }
  .wx-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 120% 60% at 80% 20%, rgba(255,255,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 80% 40% at 10% 80%, rgba(100,160,255,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .wx-inner { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; padding: 10px 12px 8px; min-height: 0; }
  .wx-location-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .wx-location { font-size: 0.92vw; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 4px; }
  .wx-updated { font-size: 0.78vw; color: rgba(255,255,255,0.35); font-family: 'DM Mono', monospace; }
  .wx-main-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; }
  .wx-temp-block { display: flex; flex-direction: column; }
  .wx-temp { font-size: 4.2vw; font-weight: 300; color: #fff; letter-spacing: -2px; line-height: 1; margin-bottom: 1px; }
  .wx-temp sup { font-size: 1.4vw; font-weight: 400; letter-spacing: 0; vertical-align: super; margin-left: 1px; }
  .wx-condition { font-size: 1.0vw; color: rgba(255,255,255,0.85); font-weight: 400; margin-top: 2px; }
  .wx-feels { font-size: 0.88vw; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .wx-icon-wrap { display: flex; align-items: center; justify-content: center; width: 3vw; height: 3vw; flex-shrink: 0; }
  .wx-details-row { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .wx-detail-pill { display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 3px 9px; font-size: 0.82vw; color: rgba(255,255,255,0.8); }
  .wx-divider-row { display: flex; align-items: center; margin-bottom: 6px; flex-shrink: 0; }
  .wx-divider { height: 0.5px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
  .wx-forecast { display: flex; gap: 4px; flex: 1; min-height: 0; }
  .wx-day { flex: 1; background: rgba(255,255,255,0.07); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px 4px; gap: 2px; border: 0.5px solid rgba(255,255,255,0.1); }
  .wx-day-name { font-size: 0.8vw; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); }
  .wx-day-icon { width: 1.9vw; height: 1.9vw; display: flex; align-items: center; justify-content: center; }
  .wx-day-hi { font-size: 1.05vw; font-weight: 500; color: #fff; line-height: 1; }
  .wx-day-lo { font-size: 0.88vw; color: rgba(255,255,255,0.45); line-height: 1; }
  .wx-precip { display: flex; align-items: center; gap: 3px; font-size: 0.76vw; color: rgba(130,200,255,0.85); }
  .wx-loading { flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 0.75vw; gap: 8px; }
  .wx-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.6); border-radius: 50%; animation: wxspin 0.8s linear infinite; }
  @keyframes wxspin { to { transform: rotate(360deg); } }
  html.dark-mode .wx-card { background: linear-gradient(160deg, #0f2540 0%, #143560 35%, #1c4a80 65%, #0e2440 100%); }

  /* ===================== MLB CARD ===================== */
  .mlb-card {
    flex: 1;
    border-radius: 0.8vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
    /* Red Sox alternate — dark navy with red accent */
    background: linear-gradient(170deg, #0a1e3d 0%, #0d2b56 60%, #0a1e3d 100%);
    border: 0.5px solid rgba(200,16,46,0.4);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  .mlb-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #c8102e, #e8b84b, #c8102e);
    z-index: 2;
  }
  .mlb-inner { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; padding: 10px 12px 10px; min-height: 0; overflow-y: auto; gap: 8px; }

  /* Loading */
  .mlb-loading { flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 0.75vw; gap: 8px; flex-direction: column; }
  .mlb-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.1); border-top-color: rgba(200,16,46,0.8); border-radius: 50%; animation: mlbspin 0.8s linear infinite; }
  @keyframes mlbspin { to { transform: rotate(360deg); } }

  /* Teams matchup */
  .mlb-teams { display: flex; flex-direction: column; gap: 2px; }
  .mlb-team-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-radius: 6px; transition: background 0.2s; }
  .mlb-team-row.winner { background: rgba(232,184,75,0.08); }
  .mlb-team-left { display: flex; align-items: center; gap: 6px; }
  .mlb-team-name { font-size: 1.0vw; font-weight: 500; color: #fff; letter-spacing: -0.02em; }
  .mlb-team-record { font-size: 0.72vw; color: rgba(255,255,255,0.35); font-family: 'DM Mono', monospace; }
  .mlb-team-score { font-family: 'DM Mono', monospace; font-size: 1.8vw; font-weight: 500; color: rgba(255,255,255,0.3); line-height: 1; }
  .mlb-team-score.live { color: #fff; }
  .mlb-team-score.winner { color: var(--sox-gold); }

  /* Status bar */
  .mlb-status-bar { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 3px 0; }
  .mlb-status-label { font-size: 0.78vw; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; }
  .mlb-status-live { color: #c8102e; font-weight: 600; animation: pulse-red 1.5s ease-in-out infinite; }
  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .mlb-inning-arrow { font-size: 0.7vw; color: rgba(255,255,255,0.5); }

  /* Divider */
  .mlb-divider { height: 0.5px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

  /* Linescore */
  .mlb-linescore { overflow-x: auto; flex-shrink: 0; }
  .mlb-linescore table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 0.7vw; }
  .mlb-linescore th { color: rgba(255,255,255,0.3); font-weight: 400; text-align: center; padding: 2px 3px; min-width: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
  .mlb-linescore th.ls-team-h { text-align: left; min-width: 28px; padding-left: 2px; }
  .mlb-linescore td { text-align: center; padding: 3px 3px; color: rgba(255,255,255,0.6); }
  .mlb-linescore td.ls-team { text-align: left; font-family: 'DM Sans', sans-serif; font-size: 0.7vw; font-weight: 500; color: rgba(255,255,255,0.4); padding-left: 2px; }
  .mlb-linescore td.ls-cur { background: rgba(200,16,46,0.55); color: #fff; font-weight: 600; border-radius: 3px; }
  .mlb-linescore td.ls-total { font-weight: 600; color: #fff; border-left: 0.5px solid rgba(255,255,255,0.12); }
  .mlb-linescore td.ls-winner-cell { color: var(--sox-gold); }

  /* Diamond + situation */
  .mlb-situation { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .mlb-diamond-wrap { flex-shrink: 0; }
  .mlb-situation-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .mlb-count-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .mlb-count-pill { display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.07); border-radius: 20px; padding: 2px 7px; font-size: 0.72vw; color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace; }
  .mlb-count-pill span.val { color: #fff; font-weight: 600; }
  .mlb-player-row { display: flex; align-items: center; gap: 5px; font-size: 0.75vw; }
  .mlb-player-lbl { color: rgba(255,255,255,0.35); min-width: 40px; text-transform: uppercase; letter-spacing: 0.07em; font-size: 0.68vw; }
  .mlb-player-name { color: rgba(255,255,255,0.9); font-weight: 500; }

  /* Post-game pitchers */
  .mlb-pitchers { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .mlb-pitcher-row { display: flex; align-items: center; gap: 6px; font-size: 0.75vw; padding: 4px 6px; border-radius: 5px; background: rgba(255,255,255,0.04); }
  .mlb-pitcher-badge { font-size: 0.65vw; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
  .mlb-pitcher-badge.win  { background: rgba(93,202,122,0.2); color: #5dca7a; }
  .mlb-pitcher-badge.loss { background: rgba(240,96,96,0.2);  color: #f06060; }
  .mlb-pitcher-badge.save { background: rgba(232,184,75,0.2); color: var(--sox-gold); }
  .mlb-pitcher-name   { color: rgba(255,255,255,0.9); font-weight: 500; flex: 1; }
  .mlb-pitcher-record { font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.4); font-size: 0.68vw; }

  /* Next game */
  .mlb-next { display: flex; flex-direction: column; gap: 3px; padding: 6px 8px; background: rgba(255,255,255,0.04); border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.07); flex-shrink: 0; }
  .mlb-next-label { font-size: 0.65vw; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); font-weight: 600; }
  .mlb-next-info  { font-size: 0.8vw; color: rgba(255,255,255,0.8); font-weight: 500; }
  .mlb-next-detail { font-size: 0.72vw; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; }

  /* No game */
  .mlb-nogame { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .mlb-nogame-icon { font-size: 1.8vw; opacity: 0.25; }
  .mlb-nogame-text { font-size: 0.8vw; color: rgba(255,255,255,0.3); }

  /* =================== END MLB =================== */

  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .cfg-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .cfg-overlay.open { display: flex; }
  .cfg-modal { background: var(--surface); border: 0.5px solid rgba(0,0,0,0.15); border-radius: 14px; padding: 24px; width: 500px; max-height: 88vh; overflow-y: auto; }
  .cfg-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 18px; }
  .cfg-section { margin-bottom: 16px; }
  .cfg-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-weight: 500; }
  .cfg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .cfg-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 7px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 8px 16px; cursor: pointer; }
  .cfg-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="clock-block">
      <div class="clock" id="clock">--:-- --</div>
      <div class="clock-sub" id="datestr">Loading...</div>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button>
      <button class="refresh-btn" onclick="openConfig()">&#9881; Setup</button>
    </div>
  </div>

  <div class="main">
    <!-- CALENDAR -->
    <div class="cal-card">
      <div class="cal-iframe-wrap">
        <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FNew_York&showPrint=0&mode=WEEK&showTz=0&showDate=0&showTitle=0&src=ZmFtaWx5MDYwNzE3Njg5ODMyNzQzNDE1NTVAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=M2xtZWw0aTlzNDk4NnNvcnBla2cyc3Q4ZWtAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=Z3F2dWJoMzMwcHNnNjNvaGZhZXFkZWxiczA0bGxhY3JAaW1wb3J0LmNhbGVuZGFyLmdvb2dsZS5jb20&src=ZW4udXNhI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=Y19mYWY5OTAwZjdhZmRjZmU2NjY3MTQ1Y2MxMjZlNWY5YmQ1NmY5NmRjZTg2NmU3NTE0MzJmZWExMTIwMzUwMzY4QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&color=%237986cb&color=%238e24aa&color=%233f51b5&color=%237cb342&color=%23ad1457" style="border-width:0;width:100%;height:100%;display:block" frameborder="0" scrolling="no"></iframe>
      </div>
    </div>

    <div class="col">
      <!-- WEATHER -->
      <div class="wx-card">
        <div class="wx-inner" id="wx-inner">
          <div class="wx-loading"><div class="wx-spinner"></div><span>Loading weather…</span></div>
        </div>
      </div>

      <!-- MLB CARD -->
      <div class="mlb-card">
        <div class="mlb-inner" id="mlb-inner">
          <div class="mlb-loading"><div class="mlb-spinner"></div><span style="font-size:0.72vw;color:rgba(255,255,255,0.3)">Loading Red Sox…</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="cfg-overlay" id="cfg-overlay">
  <div class="cfg-modal">
    <div class="cfg-title">Dashboard Setup</div>
    <div class="cfg-section">
      <div class="cfg-label">Display Override</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="cfg-btn" id="override-light-btn" onclick="overrideMode('light')">&#9728; Light</button>
        <button class="cfg-btn" id="override-dark-btn"  onclick="overrideMode('dark')">&#9790; Dark</button>
        <button class="cfg-btn" onclick="overrideMode('screensaver')">&#128164; Screensaver</button>
      </div>
    </div>
    <div class="cfg-actions">
      <button class="cfg-btn primary" onclick="closeConfig()">Close</button>
    </div>
  </div>
</div>

<div id="screensaver" onclick="exitScreensaver()">
  <div id="ss-clock">--:-- --</div>
  <div id="ss-date"></div>
</div>

<script>
/* ================================================================
   CLOCK / MODE
   ================================================================ */
function getMode(now){const m=now.getHours()*60+now.getMinutes();if(m>=7*60&&m<20*60)return'light';if(m>=20*60&&m<22*60+30)return'dark';return'screensaver';}
let _lastScheduledMode=null,_manualOverride=null;
function applyMode(m){const h=document.documentElement,ss=document.getElementById('screensaver');if(m==='screensaver'){h.classList.add('dark-mode');ss.classList.add('active');}else{ss.classList.remove('active');m==='dark'?h.classList.add('dark-mode'):h.classList.remove('dark-mode');}}
function checkMode(){if(_manualOverride)return;const m=getMode(new Date());if(m===_lastScheduledMode)return;_lastScheduledMode=m;applyMode(m);}
function exitScreensaver(){document.getElementById('screensaver').classList.remove('active');setTimeout(()=>{if(!_manualOverride&&getMode(new Date())==='screensaver')document.getElementById('screensaver').classList.add('active');},300000);}
function openConfig(){const m=_manualOverride||getMode(new Date());document.getElementById('override-light-btn').style.cssText=m==='light'?'background:var(--blue);color:#fff':'';document.getElementById('override-dark-btn').style.cssText=m==='dark'?'background:var(--blue);color:#fff':'';document.getElementById('cfg-overlay').classList.add('open');}
function closeConfig(){document.getElementById('cfg-overlay').classList.remove('open');}
function overrideMode(mode){_manualOverride=mode;applyMode(mode);if(mode==='screensaver')closeConfig();document.getElementById('override-light-btn').style.cssText=mode==='light'?'background:var(--blue);color:#fff':'';document.getElementById('override-dark-btn').style.cssText=mode==='dark'?'background:var(--blue);color:#fff':'';}
function tickClock(){const now=new Date();let h=now.getHours(),m=now.getMinutes();const ap=h>=12?'PM':'AM';h=h%12||12;const timeStr=`${h}:${String(m).padStart(2,'0')} ${ap}`;const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];const dateStr=`${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;document.getElementById('clock').textContent=timeStr;document.getElementById('datestr').textContent=dateStr;document.getElementById('ss-clock').textContent=timeStr;document.getElementById('ss-date').textContent=dateStr;checkMode();}

    _wxFV=0;
    inner.innerHTML=`<div class="wx-location-row"><div class="wx-location"><svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M6 1a3.5 3.5 0 0 1 3.5 3.5C9.5 7.5 6 11 6 11S2.5 7.5 2.5 4.5A3.5 3.5 0 0 1 6 1z" fill="rgba(255,255,255,0.6)"/><circle cx="6" cy="4.5" r="1.2" fill="rgba(30,60,110,0.6)"/></svg>${WX_LABEL}</div><div class="wx-updated">Updated ${upd}</div></div><div class="wx-main-row"><div class="wx-temp-block"><div class="wx-temp">${tempNow}<sup>°F</sup></div><div class="wx-condition">${ci.l}</div><div class="wx-feels">Feels like ${feels}°</div></div><div class="wx-icon-wrap">${wxSVG(ci.svg,52)}</div></div><div class="wx-details-row"><div class="wx-detail-pill"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 2 Q7.5 5 7.5 7 A1.5 1.5 0 0 1 4.5 7 Q4.5 5 6 2Z" fill="rgba(130,200,255,0.9)"/></svg>${hum}% Humidity</div><div class="wx-detail-pill"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6 L10 6 M7 3 L10 6 L7 9" stroke="rgba(255,255,255,0.8)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>${wind} mph ${wdir}</div></div><div class="wx-divider-row"><div class="wx-divider" style="flex:1"></div><div style="display:flex;align-items:center;gap:4px;padding:0 6px;flex-shrink:0"><div id="wx-dot-0" style="height:6px;width:14px;border-radius:3px;background:rgba(255,255,255,0.8);transition:all 0.4s ease"></div><div id="wx-dot-1" style="height:6px;width:6px;border-radius:3px;background:rgba(255,255,255,0.3);transition:all 0.4s ease"></div></div><div class="wx-divider" style="flex:1"></div></div><div style="position:relative;flex:1;min-height:0;"><div id="wx-forecast-daily" class="wx-forecast" style="position:absolute;inset:0;transition:opacity 0.5s ease,transform 0.5s ease;opacity:1;transform:translateY(0)">${dHTML}</div><div id="wx-forecast-hourly" class="wx-forecast" style="position:absolute;inset:0;transition:opacity 0.5s ease,transform 0.5s ease;opacity:0;transform:translateY(6px);overflow-x:auto;flex-wrap:nowrap;">${hHTML||'<div style="color:rgba(255,255,255,0.4);font-size:0.8vw;margin:auto">No more hours today</div>'}</div></div>`;

function windDir(deg){if(deg==null)return'';return['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];}

function diamondSVG(onFirst, onSecond, onThird) {
  const baseSize = 42;
  const on  = 'rgba(200,16,46,0.9)';
  const off = 'rgba(255,255,255,0.12)';
  const stroke = 'rgba(255,255,255,0.25)';
  // Diamond layout: second=top-center, third=left, first=right, home=bottom
  return `<svg width="${baseSize}" height="${baseSize}" viewBox="0 0 42 42" fill="none">
    <!-- base paths -->
    <polygon points="21,4 38,21 21,38 4,21" fill="rgba(255,255,255,0.04)" stroke="${stroke}" stroke-width="0.8"/>
    <!-- second base (top) -->
    <rect x="16.5" y="1" width="9" height="9" rx="1.5" transform="rotate(45 21 5.5)" fill="${onSecond ? on : off}" stroke="${onSecond ? 'rgba(200,16,46,0.5)' : 'rgba(255,255,255,0.15)'}" stroke-width="0.8"/>
    <!-- first base (right) -->
    <rect x="29.5" y="16.5" width="9" height="9" rx="1.5" transform="rotate(45 34 21)" fill="${onFirst ? on : off}" stroke="${onFirst ? 'rgba(200,16,46,0.5)' : 'rgba(255,255,255,0.15)'}" stroke-width="0.8"/>
    <!-- third base (left) -->

    <!-- home plate (bottom) -->
    <polygon points="21,33 25,37 21,41 17,37" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>

function fmtGameTime(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit', timeZoneName:'short', timeZone:'America/New_York' });
}

async function fetchMLB() {
  const inner = document.getElementById('mlb-inner');
  try {
    // Today's schedule for Red Sox
    const today = new Date().toISOString().slice(0, 10).replace(/-/g, '-');
    const schedRes = await fetch(`${MLB_API}/schedule?teamId=${SOX_TEAM_ID}&sportId=1&date=${today}&hydrate=linescore,decisions,probablePitcher,team,game(content(summary))&language=en`);
    const schedData = await schedRes.json();

    const games = schedData.dates?.[0]?.games || [];
    const game  = games[0] || null;

    // Always fetch next game regardless
    const nextRes = await fetch(`${MLB_API}/schedule?teamId=${SOX_TEAM_ID}&sportId=1&startDate=${today}&endDate=${addDays(today,14)}&language=en`);
    const nextData = await nextRes.json();
    const nextGame = findNextGame(nextData.dates || [], game?.gamePk);

    if (!game) {
      renderNoGame(inner, nextGame);
      return;
    }

    const status    = game.status?.abstractGameState; // 'Preview','Live','Final'
    const isLive    = status === 'Live';
    const isFinal   = status === 'Final';
    const isPreview = !isLive && !isFinal;

    // Teams
    const away = game.teams?.away;
    const home = game.teams?.home;
    const awayName   = away?.team?.teamName || away?.team?.name || '—';
    const homeName   = home?.team?.teamName || home?.team?.name || '—';
    const awayAbbr   = away?.team?.abbreviation || '—';
    const homeAbbr   = home?.team?.abbreviation || '—';
    const awayRecord = away?.leagueRecord ? `${away.leagueRecord.wins}-${away.leagueRecord.losses}` : '';
    const homeRecord = home?.leagueRecord ? `${home.leagueRecord.wins}-${home.leagueRecord.losses}` : '';
    const awayScore  = away?.score ?? '—';
    const homeScore  = home?.score ?? '—';

    // Fix: parse as integers so "9" vs "10" compares correctly (string comparison would fail)
    const awayWin = isFinal && parseInt(awayScore) > parseInt(homeScore);
    const homeWin = isFinal && parseInt(homeScore) > parseInt(awayScore);

    // For live/final details, fetch live feed
    let linescore = null, situation = null, decisions = null, boxscore = null;
    if (isLive || isFinal) {
      try {
        const liveRes = await fetch(`${MLB_API_V11}/game/${game.gamePk}/feed/live`);
        const liveData = await liveRes.json();
        linescore  = liveData.liveData?.linescore;
        situation  = liveData.liveData?.plays?.currentPlay?.matchup;
        boxscore   = liveData.liveData?.boxscore;
        decisions  = liveData.liveData?.decisions;
        // Enrich situation with count info
        if (isLive) {
          const curPlay = liveData.liveData?.plays?.currentPlay;
          if (curPlay) {
            situation = {
              ...situation,
              balls:   curPlay.count?.balls   ?? '—',
              strikes: curPlay.count?.strikes ?? '—',
              outs:    linescore?.outs         ?? '—',
              batterName:  curPlay.matchup?.batter?.fullName  || '—',
              pitcherName: curPlay.matchup?.pitcher?.fullName || '—',
            };
          }
        }
      } catch(e) { /* live feed unavailable */ }
    }

    // Build HTML
    let html = '';

    // ── Matchup header ──────────────────────────────────────────
    html += `<div class="mlb-teams">`;
    html += `<div class="mlb-team-row ${awayWin ? 'winner' : ''}">
      <div class="mlb-team-left">
        <div>
          <div class="mlb-team-name">${awayName}</div>
          ${awayRecord ? `<div class="mlb-team-record">${awayAbbr} · ${awayRecord}</div>` : ''}
        </div>
      </div>
      <div class="mlb-team-score ${isPreview ? '' : (awayWin ? 'winner' : 'live')}">${isPreview ? '—' : awayScore}</div>
    </div>`;
    html += `<div class="mlb-team-row ${homeWin ? 'winner' : ''}">
      <div class="mlb-team-left">
        <div>
          <div class="mlb-team-name">${homeName}</div>
          ${homeRecord ? `<div class="mlb-team-record">${homeAbbr} · ${homeRecord}</div>` : ''}
        </div>
      </div>
      <div class="mlb-team-score ${isPreview ? '' : (homeWin ? 'winner' : 'live')}">${isPreview ? '—' : homeScore}</div>
    </div>`;
    html += `</div>`;

    // ── Status bar ──────────────────────────────────────────────
    if (isPreview) {
      const gt = fmtGameTime(game.gameDate);
      html += `<div class="mlb-status-bar"><span class="mlb-status-label">${gt}</span></div>`;
    } else if (isLive) {
      const inningNum  = linescore?.currentInning || '?';
      const inningHalf = linescore?.inningHalf || '';
      const arrow = inningHalf.toLowerCase().includes('top') ? '▲' : '▼';
      html += `<div class="mlb-status-bar">
        <span class="mlb-status-live">● LIVE</span>
        <span class="mlb-status-label">${arrow} ${inningNum}</span>
      </div>`;
    } else if (isFinal) {
      const inn = linescore?.currentInning;
      const extra = inn && inn > 9 ? ` (${inn})` : '';
      html += `<div class="mlb-status-bar"><span class="mlb-status-label">Final${extra}</span></div>`;
    }

    html += `<div class="mlb-divider"></div>`;

    // ── Linescore ───────────────────────────────────────────────
    if ((isLive || isFinal) && linescore) {
      const innings  = linescore.innings || [];
      const totalInn = Math.max(innings.length, 9);
      const curInn   = isLive ? (linescore.currentInning || 1) : -1;
      const isTop    = (linescore.inningHalf || '').toLowerCase().includes('top');

      // Away/Home totals
      const awayRuns = linescore.teams?.away?.runs   ?? awayScore;
      const homeRuns = linescore.teams?.home?.runs   ?? homeScore;
      const awayHits = linescore.teams?.away?.hits   ?? '—';
      const homeHits = linescore.teams?.home?.hits   ?? '—';
      const awayErrs = linescore.teams?.away?.errors ?? '—';
      const homeErrs = linescore.teams?.home?.errors ?? '—';

      const renderCells = (side, totalInn) => {
        let cells = '';
        for (let i = 1; i <= totalInn; i++) {
          const inn = innings.find(x => x.num === i);
          const val = inn ? (inn[side]?.runs ?? (isLive && i === curInn ? '' : '—')) : (isLive && i > innings.length ? '' : '—');
          // highlight: top half = away batting = away row; bot = home row
          const isCurAway = isLive && i === curInn && isTop;
          const isCurHome = isLive && i === curInn && !isTop;
          const isCur = side === 'away' ? isCurAway : isCurHome;
          cells += `<td class="${isCur ? 'ls-cur' : ''}">${val}</td>`;
        }
        return cells;
      };

      html += `<div class="mlb-linescore"><table>
        <thead><tr>
          <th class="ls-team-h"></th>
          ${Array.from({length: totalInn}, (_,i)=>`<th>${i+1}</th>`).join('')}
          <th class="ls-team-h" style="border-left:0.5px solid rgba(255,255,255,0.12)">R</th>
          <th class="ls-team-h">H</th>
          <th class="ls-team-h">E</th>
        </tr></thead>
        <tbody>
          <tr>
            <td class="ls-team">${awayAbbr}</td>
            ${renderCells('away', totalInn)}
            <td class="ls-total ${isFinal && awayWin ? 'ls-winner-cell' : ''}">${awayRuns}</td>
            <td class="ls-total">${awayHits}</td>
            <td class="ls-total">${awayErrs}</td>
          </tr>
          <tr>
            <td class="ls-team">${homeAbbr}</td>
            ${renderCells('home', totalInn)}
            <td class="ls-total ${isFinal && homeWin ? 'ls-winner-cell' : ''}">${homeRuns}</td>
            <td class="ls-total">${homeHits}</td>
            <td class="ls-total">${homeErrs}</td>
          </tr>
        </tbody>
      </table></div>`;
    }

    // ── Live situation: diamond + count + players ────────────────
    if (isLive && linescore) {
      const runners = linescore.offense || {};
      const onFirst  = !!runners.first;
      const onSecond = !!runners.second;
      const onThird  = !!runners.third;
      const balls   = situation?.balls   ?? linescore.balls   ?? '—';
      const strikes = situation?.strikes ?? linescore.strikes ?? '—';
      const outs    = situation?.outs    ?? linescore.outs    ?? '—';
      const batterName  = situation?.batterName  || runners.batter?.fullName  || '—';
      const pitcherName = situation?.pitcherName || '—';

      html += `<div class="mlb-divider"></div>
      <div class="mlb-situation">
        <div class="mlb-diamond-wrap">${diamondSVG(onFirst, onSecond, onThird)}</div>
        <div class="mlb-situation-info">
          <div class="mlb-count-row">
            <div class="mlb-count-pill">B <span class="val">${balls}</span></div>
            <div class="mlb-count-pill">S <span class="val">${strikes}</span></div>
            <div class="mlb-count-pill">O <span class="val">${outs}</span></div>
          </div>
          <div class="mlb-player-row">
            <span class="mlb-player-lbl">Batter</span>
            <span class="mlb-player-name">${batterName}</span>
          </div>
          <div class="mlb-player-row">
            <span class="mlb-player-lbl">Pitcher</span>
            <span class="mlb-player-name">${pitcherName}</span>
          </div>
        </div>
      </div>`;
    }

    // ── Post-game: decisions ─────────────────────────────────────
    if (isFinal && decisions) {
      html += `<div class="mlb-divider"></div><div class="mlb-pitchers">`;

      if (decisions.winner) {
        const w = decisions.winner;
        const wStats = getPitcherRecord(boxscore, w.id, 'wins', 'losses');
        html += `<div class="mlb-pitcher-row">
          <span class="mlb-pitcher-badge win">W</span>
          <span class="mlb-pitcher-name">${w.fullName}</span>
          <span class="mlb-pitcher-record">${wStats}</span>
        </div>`;
      }
      if (decisions.loser) {
        const l = decisions.loser;
        const lStats = getPitcherRecord(boxscore, l.id, 'wins', 'losses');
        html += `<div class="mlb-pitcher-row">
          <span class="mlb-pitcher-badge loss">L</span>
          <span class="mlb-pitcher-name">${l.fullName}</span>
          <span class="mlb-pitcher-record">${lStats}</span>
        </div>`;
      }
      if (decisions.save) {
        const s = decisions.save;
        const sStats = getPitcherRecord(boxscore, s.id, 'saves');
        html += `<div class="mlb-pitcher-row">
          <span class="mlb-pitcher-badge save">SV</span>
          <span class="mlb-pitcher-name">${s.fullName}</span>
          <span class="mlb-pitcher-record">${sStats}</span>
        </div>`;
      }

      html += `</div>`;
    }

    // ── Next game (only after today's game is over) ──────────────
    if (isFinal && nextGame) {
      html += `<div class="mlb-divider"></div>`;
      html += buildNextGame(nextGame);
    }

    inner.innerHTML = html;

  } catch(e) {
    inner.innerHTML = `<div class="mlb-loading"><span style="font-size:1.2vw;opacity:0.4">⚠</span><span>Unable to load game data</span></div>`;
    console.error('MLB fetch error:', e);
  }
}

function getPitcherRecord(boxscore, playerId, ...statNames) {
  if (!boxscore || !playerId) return '';
  const pid = String(playerId);
  // Find in away/home player objects
  for (const side of ['away','home']) {
    const pObj = boxscore.teams?.[side]?.players?.['ID' + pid];
    if (!pObj) continue;
    const stats = pObj.seasonStats?.pitching || pObj.stats?.pitching || {};
    if (statNames.includes('saves')) {
      return stats.saves != null ? `${stats.saves} SV` : '';
    }
    const w = stats.wins ?? '?';
    const l = stats.losses ?? '?';
    return `${w}-${l}`;
  }
  return '';
}

function findNextGame(dates, todayGamePk) {
  const today = new Date().toISOString().slice(0, 10);
  for (const d of dates) {
    for (const g of (d.games || [])) {
      // Skip today's game (already being shown)
      if (g.gamePk === todayGamePk) continue;
      // Skip completed games
      if (g.status?.abstractGameState === 'Final') continue;
      // Skip postponed, cancelled, suspended, or any non-upcoming state
      if (g.status?.abstractGameState === 'Live') continue;
      const detailedState = g.status?.detailedState || '';
      if (/postponed|cancelled|suspended/i.test(detailedState)) continue;
      return g;
    }
  }
  return null;
}

function buildNextGame(game) {
  const away = game.teams?.away?.team?.teamName || game.teams?.away?.team?.name || '—';
  const home = game.teams?.home?.team?.teamName || game.teams?.home?.team?.name || '—';
  const isSoxHome = game.teams?.home?.team?.id === SOX_TEAM_ID;
  const opponent  = isSoxHome ? `vs ${away}` : `@ ${home}`;
  const gameTime  = fmtGameTime(game.gameDate);
  return `<div class="mlb-next">
    <div class="mlb-next-label">Next Game</div>
    <div class="mlb-next-info">${opponent}</div>
    <div class="mlb-next-detail">${gameTime}</div>
  </div>`;
}

function renderNoGame(inner, nextGame) {
  // nextGame is only shown if it's a genuinely future game (findNextGame already
  // filters out same-day games and non-preview states, so this is safe)
  let html = `<div class="mlb-nogame">
    <div class="mlb-nogame-icon">⚾</div>
    <div class="mlb-nogame-text">No game today</div>
  </div>`;
  if (nextGame) {
    html += `<div style="padding:0 4px 4px">` + buildNextGame(nextGame) + `</div>`;
  }
  inner.innerHTML = html;
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

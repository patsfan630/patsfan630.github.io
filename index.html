<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366">
<title>Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaed;
    --border: rgba(0,0,0,0.1);
    --text: #1a1c22;
    --muted: #7a7f90;
    --dim: #9098a8;
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,0.1);
    --coral: #e05c2a;
    --red: #dc2626;
    --green: #16a34a;
  }

  /* DARK MODE — applied via class on <html> */
  html.dark-mode {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --text: #e2e5f0;
    --muted: #565c72;
    --dim: #363c50;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --coral: #f5875a;
    --red: #f06060;
    --green: #5dca7a;
  }
  html.dark-mode .clock,
  html.dark-mode .clock-sub { color: #e2e5f0; }
  html.dark-mode .score-card.mlb { background: #0a1e35; border-color: rgba(189,48,57,0.3); }
  html.dark-mode .score-card.mlb .sc-team-name { color: #c8d8e8; }
  html.dark-mode .score-card.mlb .sc-abbr { color: #fff; }
  html.dark-mode .score-card.mlb .sc-record { color: #5a7a9a; }
  html.dark-mode .score-card.mlb .sc-score { color: #8aaacc; }
  html.dark-mode .score-card.mlb .sc-score.winner { color: #fff; }
  html.dark-mode .score-card.nba { background: #051e0f; border-color: rgba(0,122,51,0.4); }
  html.dark-mode .score-card.nba .sc-team-name { color: #a8c8a8; }
  html.dark-mode .score-card.nba .sc-abbr { color: #fff; }
  html.dark-mode .score-card.nba .sc-record { color: #2a5a3a; }
  html.dark-mode .score-card.nba .sc-score { color: #4a8a5a; }
  html.dark-mode .score-card.nba .sc-score.winner { color: #BA9A3C; }

  /* SCREENSAVER */
  #screensaver {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
  }
  #screensaver.active { display: flex; }
  #ss-clock {
    font-family: 'DM Mono', monospace;
    font-size: 12vw;
    font-weight: 300;
    color: rgba(255,255,255,0.15);
    letter-spacing: -4px;
    line-height: 1;
  }
  #ss-date {
    font-family: 'DM Mono', monospace;
    font-size: 2vw;
    color: rgba(255,255,255,0.08);
    letter-spacing: 0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    font-size: 14px;
    line-height: 1.4;
  }

  .screen {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    padding: 1.2vw 1.4vw 1vw;
    gap: 1vh;
  }

  /* TOP BAR */
  .topbar {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
  }
  .clock-block { display: flex; align-items: baseline; gap: 0.8vw; }
  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 1.7vw;
    font-weight: 400;
    color: #1a1c22;
    letter-spacing: -1px;
    line-height: 1;
  }
  .clock-sub { font-family: 'DM Mono', monospace; font-size: 1.7vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .refresh-btn {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 0.85vw;
    padding: 0.3vw 0.7vw;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s;
  }
  .refresh-btn:hover { color: var(--text); }

  /* MAIN GRID */
  .main {
    display: grid;
    grid-template-columns: 5fr 1fr;
    gap: 0.8vw;
    min-height: 0;
    min-width: 0;
  }
  .col { display: flex; flex-direction: column; gap: 0.8vw; min-height: 0; }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 0.8vw;
    padding: 0.9vw 1vw;
    overflow: hidden;
  }
  .card-title {
    font-size: 0.8vw;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.7vw;
  }

  /* CALENDAR IFRAME CARD */
  .cal-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 0.8vw;
    padding: 0.9vw 1vw;
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
    overflow: hidden;
  }
  .cal-iframe-wrap {
    flex: 1;
    min-height: 0;
    border-radius: 6px;
    overflow: hidden;
  }
  .cal-iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* SCORES */
  .scores-wrap { display: flex; flex-direction: column; gap: 10px; }
  .score-loading { font-size: 14px; color: var(--muted); text-align: center; padding: 10px 0; }
  .score-card { border-radius: 10px; overflow: hidden; }
  .score-card.mlb { background: #fef2f2; border: 0.5px solid rgba(189,48,57,0.25); }
  .score-card.mlb .sc-header { background: #bd3039; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.mlb .sc-league { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
  .score-card.mlb .sc-status { font-size: 12px; color: rgba(255,255,255,0.85); font-family: 'DM Mono', monospace; }
  .score-card.mlb .sc-body { padding: 10px 12px; }
  .score-card.mlb .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.mlb .sc-team:last-child { border-bottom: none; }
  .score-card.mlb .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.mlb .sc-abbr { color: #111; }
  .score-card.mlb .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.mlb .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.mlb .sc-score.winner { color: #bd3039; }
  .score-card.nba { background: #f0faf4; border: 0.5px solid rgba(0,122,51,0.25); }
  .score-card.nba .sc-header { background: linear-gradient(90deg, #007a33 0%, #005a25 100%); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.nba .sc-league { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #BA9A3C; }
  .score-card.nba .sc-status { font-size: 12px; color: rgba(255,255,255,0.9); font-family: 'DM Mono', monospace; }
  .score-card.nba .sc-body { padding: 10px 12px; }
  .score-card.nba .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.nba .sc-team:last-child { border-bottom: none; }
  .score-card.nba .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.nba .sc-abbr { color: #111; }
  .score-card.nba .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.nba .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.nba .sc-score.winner { color: #007a33; }

  /* CONFIG MODAL */
  .cfg-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .cfg-overlay.open { display: flex; }
  .cfg-modal { background: var(--surface); border: 0.5px solid rgba(0,0,0,0.15); border-radius: 14px; padding: 24px; width: 460px; max-height: 88vh; overflow-y: auto; }
  .cfg-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 18px; }
  .cfg-section { margin-bottom: 16px; }
  .cfg-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .cfg-note { font-size: 13px; color: var(--dim); line-height: 1.6; margin-top: 4px; }
  .cfg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .cfg-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 7px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 8px 16px; cursor: pointer; }
  .cfg-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }

  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="screen">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="clock-block">
      <div class="clock" id="clock">--:-- --</div>
      <div class="clock-sub" id="datestr">Loading...</div>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="refreshAll()">↺ Refresh</button>
      <button class="refresh-btn" onclick="openConfig()">⚙ Setup</button>
    </div>
  </div>

  <!-- MAIN GRID -->
  <div class="main">
    <!-- LEFT: Google Calendar Embed -->
    <div class="cal-card">
      <div class="cal-iframe-wrap">
        <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FNew_York&mode=WEEK&showTitle=0&showPrint=0&showTabs=0&showTz=0&src=bWFyY2psZXJtYW5AZ21haWwuY29t&src=ZmFtaWx5MDYwNzE3Njg5ODMyNzQzNDE1NTVAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=M2xtZWw0aTlzNDk4NnNvcnBla2cyc3Q4ZWtAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=bmhsXy1tLTBqMnpqXyU0Mm9zdG9uKyU0MnJ1aW5zI3Nwb3J0c0Bncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&src=bmJhXy1tLTBid2pqXyU0Mm9zdG9uKyU0M2VsdGljcyNzcG9ydHNAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=bWxiXy1tLTAxZDV6XyU0Mm9zdG9uKyU1MmVkKyU1M294I3Nwb3J0c0Bncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&src=Z3F2dWJoMzMwcHNnNjNvaGZhZXFkZWxiczA0bGxhY3JAaW1wb3J0LmNhbGVuZGFyLmdvb2dsZS5jb20&src=ZW4udXNhI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=bmZsXy1tLTA1ZzNiXyU0ZWV3KyU0NW5nbGFuZCslNTBhdHJpb3RzI3Nwb3J0c0Bncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y19mYWY5OTAwZjdhZmRjZmU2NjY3MTQ1Y2MxMjZlNWY5YmQ1NmY5NmRjZTg2NmU3NTE0MzJmZWExMTIwMzUwMzY4QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=c2hvc2hkYXZpc0BnbWFpbC5jb20&color=%234285f4&color=%237986cb&color=%238e24aa&color=%23f6bf26&color=%230b8043&color=%23d50000&color=%233f51b5&color=%237cb342&color=%233f51b5&color=%23ad1457&color=%23d81b60" frameborder="0" scrolling="no"></iframe>
      </div>

    <!-- RIGHT COLUMN -->
    <div class="col">
      <div class="card" style="flex:1">
        <div id="wx-grid" style="display:flex;flex-direction:column;gap:6px;">
          <div style="color:var(--muted);font-size:14px;text-align:center;padding:10px 0"><span class="spinner"></span></div>
        </div>
      </div>
      <div class="card" style="flex:1;overflow-y:auto">
        <div class="card-title">Boston scores</div>
        <div class="scores-wrap" id="scores-wrap">
          <div class="score-loading"><span class="spinner"></span></div>

</div>

<!-- CONFIG MODAL -->
<div class="cfg-overlay" id="cfg-overlay">
  <div class="cfg-modal">
    <div class="cfg-title">Dashboard Setup</div>

    <div class="cfg-section">
      <div class="cfg-label">Display Override</div>
      <div class="cfg-note" style="margin-bottom:10px">Manually override the current display mode. The schedule will resume automatically at the next scheduled transition.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="cfg-btn" id="override-light-btn" onclick="overrideMode('light')">☀ Light mode</button>
        <button class="cfg-btn" id="override-dark-btn" onclick="overrideMode('dark')">🌙 Dark mode</button>
        <button class="cfg-btn" onclick="overrideMode('screensaver')">💤 Screensaver</button>
      </div>
    </div>

    <div class="cfg-actions">
      <button class="cfg-btn primary" onclick="closeConfig()">Close</button>
    </div>
  </div>
</div>

<!-- SCREENSAVER -->
<div id="screensaver" onclick="exitScreensaver()">
  <div id="ss-clock">--:-- --</div>
  <div id="ss-date"></div>
</div>

<script>
/* ---- CLOCK ---- */
function getMode(now) {
  const h = now.getHours();
  const m = now.getMinutes();
  const mins = h * 60 + m;
  if (mins >= 7 * 60 && mins < 20 * 60) return 'light';
  if (mins >= 20 * 60 && mins < 22 * 60 + 30) return 'dark';
  return 'screensaver';
}

let _lastMode = null;
let _lastScheduledMode = null;
function checkMode() {
  const now = new Date();
  const scheduledMode = getMode(now);
  if (scheduledMode === _lastScheduledMode) return;
  _lastScheduledMode = scheduledMode;
  _lastMode = scheduledMode;

  const html = document.documentElement;
  const ss = document.getElementById('screensaver');

  if (scheduledMode === 'screensaver') {
    html.classList.add('dark-mode');
    ss.classList.add('active');
  } else {
    ss.classList.remove('active');
    if (scheduledMode === 'dark') {
      html.classList.add('dark-mode');
    } else {
      html.classList.remove('dark-mode');
    }
  }
}

function exitScreensaver() {
  const ss = document.getElementById('screensaver');
  ss.classList.remove('active');
  setTimeout(() => {
    if (getMode(new Date()) === 'screensaver') {
      ss.classList.add('active');
    }
  }, 5 * 60 * 1000);
}

function openConfig() {
  const currentMode = _lastMode || getMode(new Date());
  document.getElementById('override-light-btn').style.background = currentMode === 'light' ? 'var(--blue)' : '';
  document.getElementById('override-light-btn').style.color = currentMode === 'light' ? '#fff' : '';
  document.getElementById('override-dark-btn').style.background = currentMode === 'dark' ? 'var(--blue)' : '';
  document.getElementById('override-dark-btn').style.color = currentMode === 'dark' ? '#fff' : '';
  document.getElementById('cfg-overlay').classList.add('open');
}
function closeConfig() { document.getElementById('cfg-overlay').classList.remove('open'); }

function overrideMode(mode) {
  _lastMode = null;
  const html = document.documentElement;
  const ss = document.getElementById('screensaver');
  if (mode === 'screensaver') {
    html.classList.add('dark-mode');
    ss.classList.add('active');
    _lastMode = 'screensaver';
    closeConfig();
  } else if (mode === 'dark') {
    ss.classList.remove('active');
    html.classList.add('dark-mode');
    _lastMode = 'dark';
  } else {
    ss.classList.remove('active');
    html.classList.remove('dark-mode');
    _lastMode = 'light';
  }
  document.getElementById('override-light-btn').style.background = mode === 'light' ? 'var(--blue)' : '';
  document.getElementById('override-light-btn').style.color = mode === 'light' ? '#fff' : '';
  document.getElementById('override-dark-btn').style.background = mode === 'dark' ? 'var(--blue)' : '';
  document.getElementById('override-dark-btn').style.color = mode === 'dark' ? '#fff' : '';
}

function tickClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const timeStr = `${h}:${String(m).padStart(2,'0')} ${ap}`;
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;

  document.getElementById('clock').textContent = timeStr;
  document.getElementById('datestr').textContent = dateStr;
  document.getElementById('ss-clock').textContent = timeStr;
  document.getElementById('ss-date').textContent = dateStr;

  checkMode();
}
setInterval(tickClock, 1000);
tickClock();

/* ---- SCORES ---- */
async function fetchScores() {
  const el = document.getElementById('scores-wrap');
  el.innerHTML = '<div class="score-loading"><span class="spinner"></span></div>';
  try {
    const [mlbRes, nbaRes] = await Promise.all([
      fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard'),
      fetch('https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard')
    ]);
    const mlbData = await mlbRes.json();
    const nbaData = await nbaRes.json();
    const soxGame = findTeamGame(mlbData, 'BOS');
    const celticsGame = findTeamGame(nbaData, 'BOS');
    el.innerHTML = '';
    if (soxGame) el.appendChild(await buildScoreCard(soxGame, 'MLB · Red Sox', 'mlb'));
    if (celticsGame) el.appendChild(await buildScoreCard(celticsGame, 'NBA · Celtics', 'nba'));
    if (!soxGame && !celticsGame) el.innerHTML = '<div class="score-loading">No games today</div>';
  } catch(e) {
    el.innerHTML = '<div class="score-loading">Unable to load scores</div>';
  }
}

function findTeamGame(data, abbrev) {
  return (data?.events || []).find(evt =>
    evt.competitions?.[0]?.competitors?.some(c => c.team?.abbreviation === abbrev)
  ) || null;
}

async function buildScoreCard(game, label, league) {
  const comp = game.competitions?.[0];
  const status = comp?.status?.type;
  const competitors = comp?.competitors || [];
  const home = competitors.find(c => c.homeAway === 'home');
  const away = competitors.find(c => c.homeAway === 'away');
  const t1 = away || competitors[0] || {};
  const t2 = home || competitors[1] || {};
  const s1 = parseInt(t1.score || 0), s2 = parseInt(t2.score || 0);
  const done = status?.completed, inProgress = status?.state === 'in';
  const showScore = done || inProgress;
  const n1 = t1.team?.abbreviation || '—', n2 = t2.team?.abbreviation || '—';
  const r1 = t1.records?.[0]?.summary || '', r2 = t2.records?.[0]?.summary || '';

  let statusLabel = '';
  if (done) statusLabel = 'Final';
  else if (inProgress) statusLabel = comp?.status?.detail || 'Live';
  else { const d = new Date(game.date); statusLabel = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }

  let liveHTML = '';
  if (inProgress) {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${league === 'mlb' ? 'baseball/mlb' : 'basketball/nba'}/summary?event=${game.id}`);
      const data = await res.json();

      if (league === 'mlb') {
        const situation = data.situation || {};
        const balls = situation.balls ?? '—';
        const strikes = situation.strikes ?? '—';
        const outs = situation.outs ?? '—';
        const inning = comp?.status?.detail || '';
        const allAthletes = data.boxscore?.players?.flatMap(t => t.statistics || []).flatMap(s => s.athletes || []) || [];
        const findName = id => allAthletes.find(a => String(a.athlete?.id) === String(id))?.athlete?.displayName || '—';
        const batter = findName(situation.batter?.playerId);
        const pitcher = findName(situation.pitcher?.playerId);

        const onFirst  = situation.onFirst  ? 'var(--blue)' : 'var(--surface2)';
        const onSecond = situation.onSecond ? 'var(--blue)' : 'var(--surface2)';
        const onThird  = situation.onThird  ? 'var(--blue)' : 'var(--surface2)';

        liveHTML = `
          <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <span style="font-size:12px;color:var(--muted)">${inning}</span>
              <span style="font-size:12px;color:var(--muted)">B${balls} S${strikes} O${outs}</span>
              <div style="position:relative;width:28px;height:28px;flex-shrink:0">
                <div style="position:absolute;top:0;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:${onSecond};border:1px solid var(--blue)"></div>
                <div style="position:absolute;top:50%;right:0;transform:translateY(-50%) rotate(45deg);width:9px;height:9px;background:${onFirst};border:1px solid var(--blue)"></div>
                <div style="position:absolute;top:50%;left:0;transform:translateY(-50%) rotate(45deg);width:9px;height:9px;background:${onThird};border:1px solid var(--blue)"></div>
                <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:var(--surface2);border:1px solid var(--blue)"></div>
              </div>
            </div>
            <div style="font-size:12px;color:var(--muted)">🏏 <span style="color:var(--text)">${batter}</span></div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">⚾ <span style="color:var(--text)">${pitcher}</span></div>
          </div>
        `;
      } else if (league === 'nba') {
        const period = comp?.status?.period || '—';
        const clock = comp?.status?.displayClock || '—';
        const periodLabel = period === 1 ? '1st' : period === 2 ? '2nd' : period === 3 ? '3rd' : period === 4 ? '4th' : `OT${period - 4}`;
        liveHTML = `
          <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">
            <div style="font-size:13px;color:var(--muted);text-align:center">${periodLabel} &middot; ${clock}</div>
          </div>
        `;
      }
    } catch(e) {}
  }

  const card = document.createElement('div');
  card.className = `score-card ${league}`;
  card.innerHTML = `
    <div class="sc-header">
      <span class="sc-league">${label}</span>
      <span class="sc-status">${statusLabel}</span>
    </div>
    <div class="sc-body">
      <div class="sc-team">
        <div class="sc-team-name"><span class="sc-abbr">${n1}</span>${r1 ? `<span class="sc-record">${r1}</span>` : ''}</div>
        <span class="sc-score ${done && s1 > s2 ? 'winner' : ''}">${showScore ? s1 : '—'}</span>
      </div>
      <div class="sc-team">
        <div class="sc-team-name"><span class="sc-abbr">${n2}</span>${r2 ? `<span class="sc-record">${r2}</span>` : ''}</div>
        <span class="sc-score ${done && s2 > s1 ? 'winner' : ''}">${showScore ? s2 : '—'}</span>
      </div>
      ${liveHTML}
    </div>`;
  return card;
}

/* ---- WEATHER ---- */
async function fetchWeather() {
  const el = document.getElementById('wx-grid');
  try {
    const pointRes = await fetch('https://api.weather.gov/points/40.9001,-73.9120', { headers: { 'User-Agent': 'FamilyDashboard/1.0' } });
    const pointData = await pointRes.json();

    const [fRes, fHourlyRes] = await Promise.all([
      fetch(pointData.properties.forecast, { headers: { 'User-Agent': 'FamilyDashboard/1.0' } }),
      fetch(pointData.properties.forecastHourly, { headers: { 'User-Agent': 'FamilyDashboard/1.0' } })
    ]);
    const fData = await fRes.json();
    const fHourly = await fHourlyRes.json();

    const periods = fData.properties.periods;
    const hourly = fHourly.properties.periods;

    const wxIcon = desc => {
      const d = desc.toLowerCase();
      if (d.includes('thunder')) return '⛈';
      if (d.includes('snow') || d.includes('blizzard')) return '❄';
      if (d.includes('sleet') || d.includes('freezing')) return '🌨';
      if (d.includes('rain') || d.includes('shower') || d.includes('drizzle')) return '🌧';
      if (d.includes('fog') || d.includes('mist')) return '🌫';
      if (d.includes('partly') || d.includes('mostly sunny')) return '⛅';
      if (d.includes('cloud') || d.includes('overcast')) return '☁';
      if (d.includes('sunny') || d.includes('clear')) return '☀';
      return '⛅';
    };

    const current = hourly[0];
    const currentTemp = Math.round(current.temperature);
    const currentDesc = current.shortForecast;
    const currentHumidity = current.relativeHumidity?.value ? Math.round(current.relativeHumidity.value) + '%' : '—';
    const currentWind = current.windSpeed + ' ' + current.windDirection;

    const today = periods.find(p => p.isDaytime);
    const tonight = periods.find(p => !p.isDaytime && p.name.toLowerCase().includes('tonight'));
    const futureDays = periods.filter(p => p.isDaytime && p.number > (today?.number || 0)).slice(0, 2);

    const precipStr = p => (p.probabilityOfPrecipitation?.value || 0) > 20
      ? `<span style="color:var(--blue);font-size:12px">💧${Math.round(p.probabilityOfPrecipitation.value)}%</span>`
      : '';

    const divider = `<div style="height:0.5px;background:var(--border);margin:4px 0"></div>`;

    const currentBlock = `
      <div style="display:flex;align-items:center;gap:10px;padding:6px 0">
        <span style="font-size:36px;line-height:1">${wxIcon(currentDesc)}</span>
        <div style="flex:1">
          <div style="font-size:22px;font-weight:400;font-family:'DM Mono',monospace;color:var(--text);line-height:1">${currentTemp}°</div>
          <div style="font-size:13px;color:var(--muted);margin-top:2px">${currentDesc}</div>
        </div>
        <div style="text-align:right;font-size:12px;color:var(--muted);line-height:1.7">
          <div>Humidity: ${currentHumidity}</div>
          <div>Wind: ${currentWind}</div>
        </div>
      </div>
    `;

    const forecastRow = (label, p) => `
      <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:0.5px solid var(--border)">
        <span style="font-size:13px;color:var(--muted);width:58px;flex-shrink:0">${label}</span>
        <span style="font-size:18px;line-height:1">${wxIcon(p.shortForecast)}</span>
        <span style="font-size:13px;color:var(--text);flex:1;padding:0 6px;white-space:normal;line-height:1.4">${p.shortForecast}</span>
        ${precipStr(p)}
        <span style="font-family:'DM Mono',monospace;font-size:16px;color:var(--text);margin-left:4px">${Math.round(p.temperature)}°</span>
      </div>
    `;

    el.innerHTML =
      currentBlock +
      divider +
      (today ? forecastRow('Today', today) : '') +
      (tonight ? forecastRow('Tonight', tonight) : '') +
      futureDays.map((p, i) => forecastRow(i === 0 ? 'Tomorrow' : p.name, p)).join('');

  } catch(e) {
    el.innerHTML = '<div style="color:var(--muted);font-size:14px;text-align:center;padding:10px">Unable to load weather</div>';
  }
}

/* ---- MAIN ---- */
async function refreshAll() {
  await Promise.all([fetchScores(), fetchWeather()]);
}

refreshAll();
setInterval(refreshAll, 15 * 60 * 1000);
setInterval(fetchScores, 30 * 1000);
</script>

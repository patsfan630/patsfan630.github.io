<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366">
<title>Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaed;
    --border: rgba(0,0,0,0.1);
    --text: #1a1c22;
    --muted: #7a7f90;
    --dim: #9098a8;
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,0.1);
    --coral: #e05c2a;
    --red: #dc2626;
    --green: #16a34a;
  }

  html.dark-mode {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --text: #e2e5f0;
    --muted: #565c72;
    --dim: #363c50;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --coral: #f5875a;
    --red: #f06060;
    --green: #5dca7a;
  }
  html.dark-mode .clock,
  html.dark-mode .clock-sub { color: #e2e5f0; }
  html.dark-mode .score-card.mlb { background: #0a1e35; border-color: rgba(189,48,57,0.3); }
  html.dark-mode .score-card.mlb .sc-team-name { color: #c8d8e8; }
  html.dark-mode .score-card.mlb .sc-abbr { color: #fff; }
  html.dark-mode .score-card.mlb .sc-record { color: #5a7a9a; }
  html.dark-mode .score-card.mlb .sc-score { color: #8aaacc; }
  html.dark-mode .score-card.mlb .sc-score.winner { color: #fff; }
  html.dark-mode .score-card.nba { background: #051e0f; border-color: rgba(0,122,51,0.4); }
  html.dark-mode .score-card.nba .sc-team-name { color: #a8c8a8; }
  html.dark-mode .score-card.nba .sc-abbr { color: #fff; }
  html.dark-mode .score-card.nba .sc-record { color: #2a5a3a; }
  html.dark-mode .score-card.nba .sc-score { color: #4a8a5a; }
  html.dark-mode .score-card.nba .sc-score.winner { color: #BA9A3C; }
  html.dark-mode .score-card.nhl { background: #0a0f2a; border-color: rgba(252,181,20,0.3); }
  html.dark-mode .score-card.nhl .sc-team-name { color: #c8d0e8; }
  html.dark-mode .score-card.nhl .sc-abbr { color: #fff; }
  html.dark-mode .score-card.nhl .sc-record { color: #4a5070; }
  html.dark-mode .score-card.nhl .sc-score { color: #6a78b0; }
  html.dark-mode .score-card.nhl .sc-score.winner { color: #fcb514; }

  #screensaver {
    display: none; position: fixed; inset: 0; background: #000; z-index: 999;
    align-items: center; justify-content: center; flex-direction: column; gap: 8px; cursor: pointer;
  }
  #screensaver.active { display: flex; }
  #ss-clock { font-family: 'DM Mono', monospace; font-size: 12vw; font-weight: 300; color: rgba(255,255,255,0.15); letter-spacing: -4px; line-height: 1; }
  #ss-date { font-family: 'DM Mono', monospace; font-size: 2vw; color: rgba(255,255,255,0.08); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 14px; line-height: 1.4; }

  .screen { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr; padding: 1.2vw 1.4vw 1vw; gap: 1vh; }

  .topbar { display: grid; grid-template-columns: 1fr auto; align-items: center; }
  .clock-block { display: flex; align-items: baseline; gap: 0.8vw; }
  .clock { font-family: 'DM Mono', monospace; font-size: 1.7vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .clock-sub { font-family: 'DM Mono', monospace; font-size: 1.7vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .refresh-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.85vw; padding: 0.3vw 0.7vw; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.2s; }
  .refresh-btn:hover { color: var(--text); }

  .main { display: grid; grid-template-columns: 5fr 1fr; gap: 0.8vw; min-height: 0; min-width: 0; }
  .col { display: flex; flex-direction: column; gap: 0.8vw; min-height: 0; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 0.8vw; padding: 0.9vw 1vw; overflow: hidden; }
  .card-title { font-size: 0.8vw; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7vw; }

  .cal-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 0.8vw; padding: 0.9vw 1vw; display: flex; flex-direction: column; min-height: 0; flex: 1; overflow: hidden; }
  .cal-iframe-wrap { flex: 1; min-height: 0; border-radius: 6px; overflow: hidden; }
  .cal-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ===================== ACCUWEATHER-STYLE WIDGET ===================== */
  .wx-card {
    flex: 1;
    border-radius: 0.8vw;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border: 0.5px solid rgba(255,255,255,0.18);
    background: linear-gradient(160deg, #1a3a5c 0%, #1e4a7a 35%, #2a5fa0 65%, #1b3a62 100%);
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }

  /* Subtle cloud texture overlay */
  .wx-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 120% 60% at 80% 20%, rgba(255,255,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 80% 40% at 10% 80%, rgba(100,160,255,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .wx-inner {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px 12px 8px;
    min-height: 0;
  }

  /* Location row */
  .wx-location-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .wx-location {
    font-size: 0.92vw;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .wx-location svg { opacity: 0.65; }
  .wx-updated {
    font-size: 0.78vw;
    color: rgba(255,255,255,0.35);
    font-family: 'DM Mono', monospace;
  }

  /* Main temp + icon row */
  .wx-main-row {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 2px;
  }
  .wx-temp-block { display: flex; flex-direction: column; }
  .wx-temp {
    font-family: 'DM Sans', sans-serif;
    font-size: 4.2vw;
    font-weight: 300;
    color: #fff;
    letter-spacing: -2px;
    line-height: 1;
    margin-bottom: 1px;
  }
  .wx-temp sup {
    font-size: 1.4vw;
    font-weight: 400;
    letter-spacing: 0;
    vertical-align: super;
    margin-left: 1px;
  }
  .wx-condition {
    font-size: 1.0vw;
    color: rgba(255,255,255,0.85);
    font-weight: 400;
    margin-top: 2px;
    line-height: 1.2;
  }
  .wx-feels {
    font-size: 0.88vw;
    color: rgba(255,255,255,0.5);
    margin-top: 2px;
  }

  /* Weather icon */
  .wx-icon-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 3vw;
    height: 3vw;
    flex-shrink: 0;
  }
  .wx-icon-wrap svg, .wx-icon-wrap img {
    width: 100%;
    height: 100%;
  }

  /* Details row (humidity, wind) */
  .wx-details-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .wx-detail-pill {
    display: flex;
    align-items: center;
    gap: 3px;
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 3px 9px;
    font-size: 0.82vw;
    color: rgba(255,255,255,0.8);
  }
  .wx-detail-pill svg { opacity: 0.75; flex-shrink: 0; }

  /* Divider */
  .wx-divider-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .wx-divider {
    height: 0.5px;
    background: rgba(255,255,255,0.15);
    flex-shrink: 0;
  }

  /* 3-day forecast */
  .wx-forecast {
    display: flex;
    gap: 4px;
    flex: 1;
    min-height: 0;
  }
  .wx-day {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 5px 4px;
    gap: 2px;
    border: 0.5px solid rgba(255,255,255,0.1);
  }
  .wx-day-name {
    font-size: 0.8vw;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.6);
  }
  .wx-day-icon {
    width: 1.9vw;
    height: 1.9vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wx-day-icon svg { width: 100%; height: 100%; }
  .wx-day-hi {
    font-size: 1.05vw;
    font-weight: 500;
    color: #fff;
    line-height: 1;
  }
  .wx-day-lo {
    font-size: 0.88vw;
    font-weight: 400;
    color: rgba(255,255,255,0.45);
    line-height: 1;
  }

  /* Precip bar */
  .wx-precip {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.76vw;
    color: rgba(130,200,255,0.85);
  }
  .wx-precip svg { flex-shrink: 0; }

  /* Loading / error state */
  .wx-loading {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.4);
    font-size: 0.75vw;
    gap: 8px;
  }
  .wx-spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: rgba(255,255,255,0.6);
    border-radius: 50%;
    animation: wxspin 0.8s linear infinite;
  }
  @keyframes wxspin { to { transform: rotate(360deg); } }

  /* Dark mode: slightly adjust gradient */
  html.dark-mode .wx-card {
    background: linear-gradient(160deg, #0f2540 0%, #143560 35%, #1c4a80 65%, #0e2440 100%);
  }
  /* ===================== END WEATHER WIDGET ===================== */

  /* SCORES */
  .score-loading { font-size: 14px; color: var(--muted); text-align: center; padding: 10px 0; }
  .score-card { border-radius: 10px; overflow: hidden; }

  .score-card.mlb { background: #fef2f2; border: 0.5px solid rgba(189,48,57,0.25); }
  .score-card.mlb .sc-header { background: #bd3039; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.mlb .sc-team-label { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: #fff; line-height: 1.1; }
  .score-card.mlb .sc-league { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.65); }
  .score-card.mlb .sc-status { font-size: 12px; color: rgba(255,255,255,0.85); font-family: 'DM Mono', monospace; }
  .score-card.mlb .sc-body { padding: 10px 12px; }
  .score-card.mlb .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.mlb .sc-team:last-child { border-bottom: none; }
  .score-card.mlb .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.mlb .sc-abbr { color: #111; }
  .score-card.mlb .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.mlb .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.mlb .sc-score.winner { color: #bd3039; }

  .score-card.nba { background: #f0faf4; border: 0.5px solid rgba(0,122,51,0.25); }
  .score-card.nba .sc-header { background: linear-gradient(90deg, #007a33 0%, #005a25 100%); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.nba .sc-team-label { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: #BA9A3C; line-height: 1.1; }
  .score-card.nba .sc-league { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
  .score-card.nba .sc-status { font-size: 12px; color: rgba(255,255,255,0.9); font-family: 'DM Mono', monospace; }
  .score-card.nba .sc-body { padding: 10px 12px; }
  .score-card.nba .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.nba .sc-team:last-child { border-bottom: none; }
  .score-card.nba .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.nba .sc-abbr { color: #111; }
  .score-card.nba .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.nba .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.nba .sc-score.winner { color: #007a33; }

  .score-card.nhl { background: #f0f2ff; border: 0.5px solid rgba(22,43,94,0.2); }
  .score-card.nhl .sc-header { background: linear-gradient(90deg, #162b5e 0%, #0d1e42 100%); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.nhl .sc-team-label { font-size: 15px; font-weight: 700; letter-spacing: 0.02em; color: #fcb514; line-height: 1.1; }
  .score-card.nhl .sc-league { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); }
  .score-card.nhl .sc-status { font-size: 12px; color: rgba(255,255,255,0.9); font-family: 'DM Mono', monospace; }
  .score-card.nhl .sc-body { padding: 10px 12px; }
  .score-card.nhl .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.nhl .sc-team:last-child { border-bottom: none; }
  .score-card.nhl .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.nhl .sc-abbr { color: #111; }
  .score-card.nhl .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.nhl .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.nhl .sc-score.winner { color: #162b5e; }

  .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border); cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
  .carousel-dot.active { background: var(--muted); }

  .cfg-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .cfg-overlay.open { display: flex; }
  .cfg-modal { background: var(--surface); border: 0.5px solid rgba(0,0,0,0.15); border-radius: 14px; padding: 24px; width: 460px; max-height: 88vh; overflow-y: auto; }
  .cfg-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 18px; }
  .cfg-section { margin-bottom: 16px; }
  .cfg-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .cfg-note { font-size: 13px; color: var(--dim); line-height: 1.6; margin-top: 4px; }
  .cfg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .cfg-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 7px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 8px 16px; cursor: pointer; }
  .cfg-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }

  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="clock-block">
      <div class="clock" id="clock">--:-- --</div>
      <div class="clock-sub" id="datestr">Loading...</div>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button>
      <button class="refresh-btn" onclick="openConfig()">&#9881; Setup</button>
    </div>
  </div>

  <div class="main">
    <div class="cal-card">
      <div class="cal-iframe-wrap">
        <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FNew_York&showPrint=0&mode=WEEK&showTitle=0&showDate=0&showTabs=0&showTz=0&src=bWFyY2psZXJtYW5AZ21haWwuY29t&src=ZmFtaWx5MDYwNzE3Njg5ODMyNzQzNDE1NTVAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=M2xtZWw0aTlzNDk4NnNvcnBla2cyc3Q4ZWtAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=bmhsXy1tLTBqMnpqXyU0Mm9zdG9uKyU0MnJ1aW5zI3Nwb3J0c0Bncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&src=bmJhXy1tLTBid2pqXyU0Mm9zdG9uKyU0M2VsdGljcyNzcG9ydHNAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=bWxiXy1tLTAxZDV6XyU0Mm9zdG9uKyU1MnJlZCslNTNveClzcG9ydHNAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=Z3F2dWJoMzMwcHNnNjNvaGZhZXFkZWxiczA0bGxhY3JAaW1wb3J0LmNhbGVuZGFyLmdvb2dsZS5jb20&src=ZW4udXNhI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=bmZsXy1tLTA1ZzNiXyU0ZWV3KyU0NW5nbGFuZCslNTBhdHJpb3RzI3Nwb3J0c0Bncm91cC52LmNhbGVuZGFyLmdvb2dsZS5jb20&src=Y19mYWY5OTAwZjdhZmRjZmU2NjY3MTQ1Y2MxMjZlNWY5YmQ1NmY5NmRjZTg2NmU3NTE0MzJmZWExMTIwMzUwMzY4QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&src=c2hvc2hkYXZpc0BnbWFpbC5jb20&color=%234285f4&color=%237986cb&color=%238e24aa&color=%23f6bf26&color=%230b8043&color=%23d50000&color=%233f51b5&color=%237cb342&color=%233f51b5&color=%23ad1457&color=%23d81b60" style="border-width:0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
      </div>
    </div>

    <div class="col">

      <!-- ===================== WEATHER CARD ===================== -->
      <div class="wx-card">
        <div class="wx-inner" id="wx-inner">
          <div class="wx-loading"><div class="wx-spinner"></div><span>Loading weather…</span></div>
        </div>
      </div>
      <!-- =================== END WEATHER CARD =================== -->

      <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-shrink:0;">
          <div class="card-title" style="margin-bottom:0">Boston scores</div>
          <div style="display:flex;align-items:center;gap:5px;">
            <div id="carousel-dots" style="display:flex;gap:4px;align-items:center;"></div>
            <button onclick="carouselPrev()" style="background:var(--surface2);border:0.5px solid var(--border);border-radius:5px;color:var(--muted);width:22px;height:22px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;">&#8249;</button>
            <button onclick="carouselNext()" style="background:var(--surface2);border:0.5px solid var(--border);border-radius:5px;color:var(--muted);width:22px;height:22px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1;">&#8250;</button>
          </div>
        </div>
        <div id="scores-wrap" style="flex:1;min-height:0;overflow-y:auto;">
          <div class="score-loading"><span class="spinner"></span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="cfg-overlay" id="cfg-overlay">
  <div class="cfg-modal">
    <div class="cfg-title">Dashboard Setup</div>
    <div class="cfg-section">
      <div class="cfg-label">Display Override</div>
      <div class="cfg-note" style="margin-bottom:10px">Manually override the current display mode. The schedule will resume automatically at the next scheduled transition.</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="cfg-btn" id="override-light-btn" onclick="overrideMode('light')">&#9728; Light mode</button>
        <button class="cfg-btn" id="override-dark-btn" onclick="overrideMode('dark')">&#9790; Dark mode</button>
        <button class="cfg-btn" onclick="overrideMode('screensaver')">&#128164; Screensaver</button>
      </div>
    </div>
    <div class="cfg-actions">
      <button class="cfg-btn primary" onclick="closeConfig()">Close</button>
    </div>
  </div>
</div>

<div id="screensaver" onclick="exitScreensaver()">
  <div id="ss-clock">--:-- --</div>
  <div id="ss-date"></div>
</div>

<script>
/* ================================================================
   CLOCK / MODE
   ================================================================ */
function getMode(now) {
  const mins = now.getHours() * 60 + now.getMinutes();
  if (mins >= 7*60 && mins < 20*60) return 'light';
  if (mins >= 20*60 && mins < 22*60+30) return 'dark';
  return 'screensaver';
}

let _lastMode = null, _lastScheduledMode = null;
function checkMode() {
  const m = getMode(new Date());
  if (m === _lastScheduledMode) return;
  _lastScheduledMode = m; _lastMode = m;
  const html = document.documentElement, ss = document.getElementById('screensaver');
  if (m === 'screensaver') { html.classList.add('dark-mode'); ss.classList.add('active'); }
  else { ss.classList.remove('active'); m === 'dark' ? html.classList.add('dark-mode') : html.classList.remove('dark-mode'); }
}

function exitScreensaver() {
  document.getElementById('screensaver').classList.remove('active');
  setTimeout(() => { if (getMode(new Date()) === 'screensaver') document.getElementById('screensaver').classList.add('active'); }, 300000);
}

function openConfig() {
  const m = _lastMode || getMode(new Date());
  document.getElementById('override-light-btn').style.cssText = m === 'light' ? 'background:var(--blue);color:#fff' : '';
  document.getElementById('override-dark-btn').style.cssText = m === 'dark' ? 'background:var(--blue);color:#fff' : '';
  document.getElementById('cfg-overlay').classList.add('open');
}
function closeConfig() { document.getElementById('cfg-overlay').classList.remove('open'); }

function overrideMode(mode) {
  _lastMode = null;
  const html = document.documentElement, ss = document.getElementById('screensaver');
  if (mode === 'screensaver') { html.classList.add('dark-mode'); ss.classList.add('active'); _lastMode = 'screensaver'; closeConfig(); }
  else if (mode === 'dark') { ss.classList.remove('active'); html.classList.add('dark-mode'); _lastMode = 'dark'; }
  else { ss.classList.remove('active'); html.classList.remove('dark-mode'); _lastMode = 'light'; }
  document.getElementById('override-light-btn').style.cssText = mode === 'light' ? 'background:var(--blue);color:#fff' : '';
  document.getElementById('override-dark-btn').style.cssText = mode === 'dark' ? 'background:var(--blue);color:#fff' : '';
}

function tickClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  const timeStr = `${h}:${String(m).padStart(2,'0')} ${ap}`;
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('clock').textContent = timeStr;
  document.getElementById('datestr').textContent = dateStr;
  document.getElementById('ss-clock').textContent = timeStr;
  document.getElementById('ss-date').textContent = dateStr;
  checkMode();
}
setInterval(tickClock, 1000);
tickClock();

/* ================================================================
   ACCUWEATHER-STYLE WIDGET
   Bronx, NY  lat=40.88  lon=-73.91
   Uses Open-Meteo (free, no key) with WMO weather codes
   ================================================================ */
const WX_LAT = 40.88;
const WX_LON = -73.91;
const WX_LABEL = 'Bronx, NY';

/* WMO weather code → { label, svgId } */
const WMO = {
  0:  { l:'Clear',           svg:'sun'         },
  1:  { l:'Mostly Clear',    svg:'sun'         },
  2:  { l:'Partly Cloudy',   svg:'partly'      },
  3:  { l:'Overcast',        svg:'cloud'       },
  45: { l:'Foggy',           svg:'fog'         },
  48: { l:'Icy Fog',         svg:'fog'         },
  51: { l:'Light Drizzle',   svg:'drizzle'     },
  53: { l:'Drizzle',         svg:'drizzle'     },
  55: { l:'Heavy Drizzle',   svg:'drizzle'     },
  61: { l:'Light Rain',      svg:'rain'        },
  63: { l:'Rain',            svg:'rain'        },
  65: { l:'Heavy Rain',      svg:'rain'        },
  71: { l:'Light Snow',      svg:'snow'        },
  73: { l:'Snow',            svg:'snow'        },
  75: { l:'Heavy Snow',      svg:'snow'        },
  77: { l:'Snow Grains',     svg:'snow'        },
  80: { l:'Light Showers',   svg:'showers'     },
  81: { l:'Showers',         svg:'showers'     },
  82: { l:'Heavy Showers',   svg:'showers'     },
  85: { l:'Snow Showers',    svg:'snow'        },
  86: { l:'Heavy Snow Showers', svg:'snow'     },
  95: { l:'Thunderstorms',   svg:'thunder'     },
  96: { l:'Hail Storm',      svg:'thunder'     },
  99: { l:'Heavy Hail Storm',svg:'thunder'     },
};

function wmo(code) { return WMO[code] || { l:'Unknown', svg:'cloud' }; }

/* SVG icons (white outlines, AccuWeather-ish style) */
function wxSVG(id, size=28) {
  const s = size;
  const icons = {
    sun: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="6.5" fill="rgba(255,210,60,0.95)" stroke="rgba(255,230,100,0.5)" stroke-width="0.5"/>
      ${[0,45,90,135,180,225,270,315].map(a=>{const r=a*Math.PI/180,x1=16+9*Math.cos(r),y1=16+9*Math.sin(r),x2=16+11.5*Math.cos(r),y2=16+11.5*Math.sin(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,210,60,0.85)" stroke-width="1.8" stroke-linecap="round"/>`;}).join('')}
    </svg>`,
    partly: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <circle cx="13" cy="13" r="5.5" fill="rgba(255,210,60,0.9)"/>
      ${[0,60,120,180,240,300].map(a=>{const r=a*Math.PI/180,x1=13+8*Math.cos(r),y1=13+8*Math.sin(r),x2=13+10*Math.cos(r),y2=13+10*Math.sin(r);return`<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="rgba(255,210,60,0.8)" stroke-width="1.5" stroke-linecap="round"/>`;}).join('')}
      <path d="M10 21 Q10 17 14 17 Q14 14 18 14 Q22 14 22 18 Q24 18 24 21 Z" fill="rgba(255,255,255,0.92)" stroke="rgba(255,255,255,0.3)" stroke-width="0.5"/>
    </svg>`,
    cloud: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <path d="M6 22 Q6 17 11 17 Q11 13 16 13 Q21 13 21 17 Q24 17 24 20 Q24 22 22 22 Z" fill="rgba(255,255,255,0.88)" stroke="rgba(255,255,255,0.2)" stroke-width="0.5"/>
    </svg>`,
    fog: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <path d="M5 14 Q10 12 16 14 Q22 16 27 14" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M7 18 Q12 16 18 18 Q23 20 26 18" stroke="rgba(255,255,255,0.5)" stroke-width="1.8" stroke-linecap="round"/>
      <path d="M5 22 Q11 20 17 22 Q22 24 27 22" stroke="rgba(255,255,255,0.35)" stroke-width="1.8" stroke-linecap="round"/>
    </svg>`,
    drizzle: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <path d="M7 16 Q7 11 12 11 Q12 8 17 8 Q22 8 22 12 Q25 12 25 16 Q25 18 23 18 H9 Q7 18 7 16Z" fill="rgba(255,255,255,0.85)"/>
      <line x1="13" y1="21" x2="11" y2="25" stroke="rgba(130,200,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="18" y1="21" x2="16" y2="25" stroke="rgba(130,200,255,0.9)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>`,
    rain: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <path d="M6 15 Q6 10 11 10 Q11 7 16 7 Q21 7 21 11 Q24 11 24 15 Q24 17 22 17 H8 Q6 17 6 15Z" fill="rgba(255,255,255,0.82)"/>
      <line x1="11" y1="21" x2="9" y2="26" stroke="rgba(130,200,255,0.95)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="16" y1="21" x2="14" y2="26" stroke="rgba(130,200,255,0.95)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="21" y1="21" x2="19" y2="26" stroke="rgba(130,200,255,0.95)" stroke-width="1.8" stroke-linecap="round"/>
    </svg>`,
    snow: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <path d="M7 15 Q7 10 12 10 Q12 7 16 7 Q21 7 21 11 Q24 11 24 15 Q24 17 22 17 H9 Q7 17 7 15Z" fill="rgba(255,255,255,0.8)"/>
      <text x="11" y="27" font-size="11" fill="rgba(200,230,255,0.95)" font-family="sans-serif" letter-spacing="3">❄</text>
    </svg>`,
    showers: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <circle cx="10" cy="11" r="4" fill="rgba(255,210,60,0.75)"/>
      <path d="M13 16 Q13 13 17 13 Q17 10 21 10 Q25 10 25 14 Q27 14 27 17 Q27 19 25 19 H15 Q13 19 13 17Z" fill="rgba(255,255,255,0.82)"/>
      <line x1="17" y1="22" x2="15" y2="27" stroke="rgba(130,200,255,0.9)" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="22" y1="22" x2="20" y2="27" stroke="rgba(130,200,255,0.9)" stroke-width="1.8" stroke-linecap="round"/>
    </svg>`,
    thunder: `<svg width="${s}" height="${s}" viewBox="0 0 32 32" fill="none">
      <path d="M5 15 Q5 10 10 10 Q10 7 15 7 Q20 7 20 11 Q23 11 23 15 Q23 17 21 17 H7 Q5 17 5 15Z" fill="rgba(255,255,255,0.82)"/>
      <path d="M15 18 L12 24 L15 24 L13 30 L19 22 L16 22 Z" fill="rgba(255,220,50,0.95)"/>
    </svg>`,
  };
  return icons[id] || icons['cloud'];
}

function c2f(c) { return Math.round(c * 9/5 + 32); }

let _wxLastUpdated = null;
let _wxForecastView = 0; // 0 = 3-day, 1 = hourly
let _wxRotateTimer = null;

function wxRotateForecast() {
  const daily = document.getElementById('wx-forecast-daily');
  const hourly = document.getElementById('wx-forecast-hourly');
  const dot0 = document.getElementById('wx-dot-0');
  const dot1 = document.getElementById('wx-dot-1');
  if (!daily || !hourly) return;
  _wxForecastView = 1 - _wxForecastView;
  if (_wxForecastView === 0) {
    daily.style.opacity  = '1';  daily.style.transform  = 'translateY(0)';
    hourly.style.opacity = '0';  hourly.style.transform = 'translateY(6px)';
    if (dot0) { dot0.style.background = 'rgba(255,255,255,0.8)'; dot0.style.width = '14px'; }
    if (dot1) { dot1.style.background = 'rgba(255,255,255,0.3)'; dot1.style.width = '6px'; }
  } else {
    daily.style.opacity  = '0';  daily.style.transform  = 'translateY(-6px)';
    hourly.style.opacity = '1';  hourly.style.transform = 'translateY(0)';
    if (dot0) { dot0.style.background = 'rgba(255,255,255,0.3)'; dot0.style.width = '6px'; }
    if (dot1) { dot1.style.background = 'rgba(255,255,255,0.8)'; dot1.style.width = '14px'; }
  }
}

function wxStartRotation() {
  if (_wxRotateTimer) clearInterval(_wxRotateTimer);
  _wxRotateTimer = setInterval(wxRotateForecast, 15000);
}

async function fetchWeather() {
  const inner = document.getElementById('wx-inner');
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WX_LAT}&longitude=${WX_LON}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max`
      + `&hourly=temperature_2m,weather_code,precipitation_probability`
      + `&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=America%2FNew_York&forecast_days=4`;

    const res = await fetch(url);
    const data = await res.json();

    const cur = data.current;
    const daily = data.daily;
    const hourly = data.hourly;

    const tempNow   = Math.round(cur.temperature_2m);
    const feelsLike = Math.round(cur.apparent_temperature);
    const humidity  = Math.round(cur.relative_humidity_2m);
    const windSpd   = Math.round(cur.wind_speed_10m);
    const windDir   = windDirLabel(cur.wind_direction_10m);
    const code      = cur.weather_code;
    const condInfo  = wmo(code);

    // 3-day forecast (skip today = index 0)
    const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const days = [];
    for (let i = 1; i <= 3; i++) {
      if (!daily.time[i]) break;
      const d = new Date(daily.time[i] + 'T12:00:00');
      days.push({
        name: DAY_SHORT[d.getDay()],
        hi: Math.round(daily.temperature_2m_max[i]),
        lo: Math.round(daily.temperature_2m_min[i]),
        code: daily.weather_code[i],
        precip: daily.precipitation_probability_max[i] || 0,
      });
    }

    // Hourly: every-other-hour from now until end of today (midnight)
    const now = new Date();
    const todayStr = now.toISOString().slice(0, 10); // YYYY-MM-DD
    const currentHour = now.getHours();
    const hourSlots = [];
    hourly.time.forEach((t, i) => {
      if (!t.startsWith(todayStr)) return; // today only
      const h = parseInt(t.slice(11, 13));
      if (h < currentHour) return;         // past hours
      if ((h - currentHour) % 2 !== 0) return; // every other hour
      let label;
      if (h === 0 || h === 24) label = '12am';
      else if (h < 12) label = `${h}am`;
      else if (h === 12) label = '12pm';
      else label = `${h-12}pm`;
      hourSlots.push({
        label,
        temp: Math.round(hourly.temperature_2m[i]),
        code: hourly.weather_code[i],
        precip: hourly.precipitation_probability[i] || 0,
      });
    });

    const updStr = `${String(now.getHours()%12||12)}:${String(now.getMinutes()).padStart(2,'0')} ${now.getHours()>=12?'PM':'AM'}`;
    _wxLastUpdated = updStr;

    // Build daily forecast HTML
    const dailyHTML = days.map(d => {
      const di = wmo(d.code);
      return `<div class="wx-day">
        <div class="wx-day-name">${d.name}</div>
        <div class="wx-day-icon">${wxSVG(di.svg, 22)}</div>
        ${d.precip > 20 ? `<div class="wx-precip"><svg width="8" height="8" viewBox="0 0 10 10"><path d="M5 1 Q6.5 4 6.5 6 A1.5 1.5 0 0 1 3.5 6 Q3.5 4 5 1Z" fill="rgba(130,200,255,0.9)"/></svg>${d.precip}%</div>` : ''}
        <div class="wx-day-hi">${d.hi}°</div>
        <div class="wx-day-lo">${d.lo}°</div>
      </div>`;
    }).join('');

    // Build hourly forecast HTML
    const hourlyHTML = hourSlots.map(h => {
      const hi = wmo(h.code);
      return `<div class="wx-day">
        <div class="wx-day-name">${h.label}</div>
        <div class="wx-day-icon">${wxSVG(hi.svg, 22)}</div>
        ${h.precip > 20 ? `<div class="wx-precip"><svg width="8" height="8" viewBox="0 0 10 10"><path d="M5 1 Q6.5 4 6.5 6 A1.5 1.5 0 0 1 3.5 6 Q3.5 4 5 1Z" fill="rgba(130,200,255,0.9)"/></svg>${h.precip}%</div>` : ''}
        <div class="wx-day-hi">${h.temp}°</div>
      </div>`;
    }).join('');

    // Reset to daily view on refresh
    _wxForecastView = 0;

    inner.innerHTML = `
      <div class="wx-location-row">
        <div class="wx-location">
          <svg width="9" height="9" viewBox="0 0 12 12" fill="none"><path d="M6 1a3.5 3.5 0 0 1 3.5 3.5C9.5 7.5 6 11 6 11S2.5 7.5 2.5 4.5A3.5 3.5 0 0 1 6 1z" fill="rgba(255,255,255,0.6)"/><circle cx="6" cy="4.5" r="1.2" fill="rgba(30,60,110,0.6)"/></svg>
          ${WX_LABEL}
        </div>
        <div class="wx-updated">Updated ${updStr}</div>
      </div>

      <div class="wx-main-row">
        <div class="wx-temp-block">
          <div class="wx-temp">${tempNow}<sup>°F</sup></div>
          <div class="wx-condition">${condInfo.l}</div>
          <div class="wx-feels">Feels like ${feelsLike}°</div>
        </div>
        <div class="wx-icon-wrap">${wxSVG(condInfo.svg, 52)}</div>
      </div>

      <div class="wx-details-row">
        <div class="wx-detail-pill">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M6 2 Q7.5 5 7.5 7 A1.5 1.5 0 0 1 4.5 7 Q4.5 5 6 2Z" fill="rgba(130,200,255,0.9)"/></svg>
          ${humidity}% Humidity
        </div>
        <div class="wx-detail-pill">
          <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6 L10 6 M7 3 L10 6 L7 9" stroke="rgba(255,255,255,0.8)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          ${windSpd} mph ${windDir}
        </div>
      </div>

      <div class="wx-divider-row">
        <div class="wx-divider" style="flex:1"></div>
        <div style="display:flex;align-items:center;gap:4px;padding:0 6px;flex-shrink:0">
          <div id="wx-dot-0" style="height:6px;width:14px;border-radius:3px;background:rgba(255,255,255,0.8);transition:all 0.4s ease"></div>
          <div id="wx-dot-1" style="height:6px;width:6px;border-radius:3px;background:rgba(255,255,255,0.3);transition:all 0.4s ease"></div>
        </div>
        <div class="wx-divider" style="flex:1"></div>
      </div>

      <div style="position:relative;flex:1;min-height:0;">
        <div id="wx-forecast-daily" class="wx-forecast" style="position:absolute;inset:0;transition:opacity 0.5s ease,transform 0.5s ease;opacity:1;transform:translateY(0)">
          ${dailyHTML}
        </div>
        <div id="wx-forecast-hourly" class="wx-forecast" style="position:absolute;inset:0;transition:opacity 0.5s ease,transform 0.5s ease;opacity:0;transform:translateY(6px);overflow-x:auto;flex-wrap:nowrap;">
          ${hourlyHTML || '<div style="color:rgba(255,255,255,0.4);font-size:0.8vw;margin:auto">No more hours today</div>'}
        </div>
      </div>
    `;

    wxStartRotation();
  } catch(e) {
    inner.innerHTML = `<div class="wx-loading" style="flex-direction:column;gap:4px">
      <span style="font-size:1.2vw">⚠</span>
      <span>Weather unavailable</span>
    </div>`;
  }
}

function windDirLabel(deg) {
  if (deg == null) return '';
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

/* ================================================================
   CAROUSEL / SCORES
   ================================================================ */
const TEAMS = [
  { label: 'MLB · Red Sox',  league: 'mlb', abbrev: 'BOS', sport: 'baseball/mlb' },
  { label: 'NBA · Celtics',  league: 'nba', abbrev: 'BOS', sport: 'basketball/nba' },
  { label: 'NHL · Bruins',   league: 'nhl', abbrev: 'BOS', sport: 'hockey/nhl' },
];
let carouselIndex = 0;
let carouselCards = [null, null, null];
let carouselAutoTimer = null;

function renderDots() {
  const el = document.getElementById('carousel-dots');
  el.innerHTML = '';
  TEAMS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'carousel-dot' + (i === carouselIndex ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    el.appendChild(dot);
  });
}

function showSlide(idx) {
  carouselIndex = ((idx % TEAMS.length) + TEAMS.length) % TEAMS.length;
  renderDots();
  const wrap = document.getElementById('scores-wrap');
  wrap.innerHTML = '';
  if (carouselCards[carouselIndex]) {
    wrap.appendChild(carouselCards[carouselIndex]);
  } else {
    wrap.innerHTML = '<div class="score-loading"><span class="spinner"></span></div>';
  }
}

function goToSlide(idx) { showSlide(idx); resetAutoAdvance(); }
function carouselNext() { goToSlide(carouselIndex + 1); }
function carouselPrev() { goToSlide(carouselIndex - 1); }

function resetAutoAdvance() {
  if (carouselAutoTimer) clearInterval(carouselAutoTimer);
  carouselAutoTimer = setInterval(() => showSlide(carouselIndex + 1), 8000);
}

async function fetchScores() {
  await Promise.all(TEAMS.map(async (team, idx) => {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${team.sport}/scoreboard`);
      const data = await res.json();
      const game = (data?.events || []).find(evt =>
        evt.competitions?.[0]?.competitors?.some(c => c.team?.abbreviation === team.abbrev)
      );
      if (game) {
        carouselCards[idx] = await buildScoreCard(game, team.label, team.league);
      } else {
        carouselCards[idx] = buildEmptyCard(team.label, team.league);
      }
    } catch(e) {
      const el = document.createElement('div');
      el.className = 'score-loading'; el.textContent = 'Unable to load';
      carouselCards[idx] = el;
    }
  }));
  showSlide(carouselIndex);
}

function buildEmptyCard(label, league) {
  const [leaguePart, teamPart] = label.split(' · ');
  const card = document.createElement('div');
  card.className = `score-card ${league}`;
  card.innerHTML = `
    <div class="sc-header">
      <div style="display:flex;flex-direction:column;gap:1px">
        <span class="sc-team-label">${teamPart || label}</span>
        <span class="sc-league">${leaguePart}</span>
      </div>
    </div>
    <div class="sc-body">
      <div style="padding:10px 0;text-align:center;font-size:13px;color:var(--muted)">No game today</div>
    </div>`;
  return card;
}

async function buildScoreCard(game, label, league) {
  const comp = game.competitions?.[0];
  const status = comp?.status?.type;
  const competitors = comp?.competitors || [];
  const home = competitors.find(c => c.homeAway === 'home');
  const away = competitors.find(c => c.homeAway === 'away');
  const t1 = away || competitors[0] || {}, t2 = home || competitors[1] || {};
  const s1 = parseInt(t1.score || 0), s2 = parseInt(t2.score || 0);
  const done = status?.completed, inProgress = status?.state === 'in';
  const showScore = done || inProgress;
  const n1 = t1.team?.abbreviation || '—', n2 = t2.team?.abbreviation || '—';
  const r1 = t1.records?.[0]?.summary || '', r2 = t2.records?.[0]?.summary || '';

  let statusLabel = '';
  if (done) statusLabel = 'Final';
  else if (inProgress) statusLabel = comp?.status?.detail || 'Live';
  else { const d = new Date(game.date); statusLabel = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }

  let liveHTML = '';
  if (inProgress) {
    try {
      const sportPath = league === 'mlb' ? 'baseball/mlb' : league === 'nba' ? 'basketball/nba' : 'hockey/nhl';
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportPath}/summary?event=${game.id}`);
      const data = await res.json();

      if (league === 'mlb') {
        const sit = data.situation || {};
        const balls = sit.balls ?? '—', strikes = sit.strikes ?? '—', outs = sit.outs ?? '—';
        const inning = comp?.status?.detail || '';
        const athletes = data.boxscore?.players?.flatMap(t => t.statistics||[]).flatMap(s => s.athletes||[]) || [];
        const findName = id => athletes.find(a => String(a.athlete?.id) === String(id))?.athlete?.displayName || '—';
        const batter = findName(sit.batter?.playerId), pitcher = findName(sit.pitcher?.playerId);
        const onFirst = sit.onFirst ? 'var(--blue)' : 'var(--surface2)';
        const onSecond = sit.onSecond ? 'var(--blue)' : 'var(--surface2)';
        const onThird = sit.onThird ? 'var(--blue)' : 'var(--surface2)';
        liveHTML = `<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:12px;color:var(--muted)">${inning}</span>
            <span style="font-size:12px;color:var(--muted)">B${balls} S${strikes} O${outs}</span>
            <div style="position:relative;width:28px;height:28px;flex-shrink:0">
              <div style="position:absolute;top:0;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:${onSecond};border:1px solid var(--blue)"></div>
              <div style="position:absolute;top:50%;right:0;transform:translateY(-50%) rotate(45deg);width:9px;height:9px;background:${onFirst};border:1px solid var(--blue)"></div>
              <div style="position:absolute;top:50%;left:0;transform:translateY(-50%) rotate(45deg);width:9px;height:9px;background:${onThird};border:1px solid var(--blue)"></div>
              <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:var(--surface2);border:1px solid var(--blue)"></div>
            </div>
          </div>
          <div style="font-size:12px;color:var(--muted)">&#127921; <span style="color:var(--text)">${batter}</span></div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">&#9917; <span style="color:var(--text)">${pitcher}</span></div>
        </div>`;
      } else if (league === 'nba' || league === 'nhl') {
        const period = comp?.status?.period || '—';
        const clock = comp?.status?.displayClock || '—';
        let periodLabel;
        if (league === 'nba') periodLabel = period===1?'1st':period===2?'2nd':period===3?'3rd':period===4?'4th':`OT${period-4}`;
        else periodLabel = period===1?'1st':period===2?'2nd':period===3?'3rd':'OT';
        liveHTML = `<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">
          <div style="font-size:13px;color:var(--muted);text-align:center">${periodLabel} &middot; ${clock}</div>
        </div>`;
      }
    } catch(e) {}
  }

  const card = document.createElement('div');
  card.className = `score-card ${league}`;
  const [leaguePart, teamPart] = label.split(' · ');
  card.innerHTML = `
    <div class="sc-header">
      <div style="display:flex;flex-direction:column;gap:1px">
        <span class="sc-team-label">${teamPart || label}</span>
        <span class="sc-league">${leaguePart}</span>
      </div>
      <span class="sc-status">${statusLabel}</span>
    </div>
    <div class="sc-body">
      <div class="sc-team">
        <div class="sc-team-name"><span class="sc-abbr">${n1}</span>${r1?`<span class="sc-record">${r1}</span>`:''}</div>
        <span class="sc-score ${done&&s1>s2?'winner':''}">${showScore?s1:'—'}</span>
      </div>
      <div class="sc-team">
        <div class="sc-team-name"><span class="sc-abbr">${n2}</span>${r2?`<span class="sc-record">${r2}</span>`:''}</div>
        <span class="sc-score ${done&&s2>s1?'winner':''}">${showScore?s2:'—'}</span>
      </div>
      ${liveHTML}
    </div>`;
  return card;
}

/* ================================================================
   MAIN REFRESH
   ================================================================ */
async function refreshAll() {
  renderDots();
  await Promise.all([fetchWeather(), fetchScores()]);
}

resetAutoAdvance();
refreshAll();
setInterval(refreshAll, 15 * 60 * 1000);   // full refresh every 15 min
setInterval(fetchScores, 30 * 1000);         // scores refresh every 30 sec
</script>

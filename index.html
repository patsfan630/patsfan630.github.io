<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366">
<title>Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaed;
    --border: rgba(0,0,0,0.1);
    --text: #1a1c22;
    --muted: #7a7f90;
    --dim: #9098a8;
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,0.1);
    --coral: #e05c2a;
    --red: #dc2626;
    --green: #16a34a;
  }

  html.dark-mode {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --text: #e2e5f0;
    --muted: #565c72;
    --dim: #363c50;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --coral: #f5875a;
    --red: #f06060;
    --green: #5dca7a;
  }
  html.dark-mode .clock,
  html.dark-mode .clock-sub { color: #e2e5f0; }
  html.dark-mode .score-card.mlb { background: #0a1e35; border-color: rgba(189,48,57,0.3); }
  html.dark-mode .score-card.mlb .sc-team-name { color: #c8d8e8; }
  html.dark-mode .score-card.mlb .sc-abbr { color: #fff; }
  html.dark-mode .score-card.mlb .sc-record { color: #5a7a9a; }
  html.dark-mode .score-card.mlb .sc-score { color: #8aaacc; }
  html.dark-mode .score-card.mlb .sc-score.winner { color: #fff; }
  html.dark-mode .score-card.nba { background: #051e0f; border-color: rgba(0,122,51,0.4); }
  html.dark-mode .score-card.nba .sc-team-name { color: #a8c8a8; }
  html.dark-mode .score-card.nba .sc-abbr { color: #fff; }
  html.dark-mode .score-card.nba .sc-record { color: #2a5a3a; }
  html.dark-mode .score-card.nba .sc-score { color: #4a8a5a; }
  html.dark-mode .score-card.nba .sc-score.winner { color: #BA9A3C; }
  html.dark-mode .score-card.nhl { background: #0a0f2a; border-color: rgba(252,181,20,0.3); }
  html.dark-mode .score-card.nhl .sc-team-name { color: #c8d0e8; }
  html.dark-mode .score-card.nhl .sc-abbr { color: #fff; }
  html.dark-mode .score-card.nhl .sc-record { color: #4a5070; }
  html.dark-mode .score-card.nhl .sc-score { color: #6a78b0; }
  html.dark-mode .score-card.nhl .sc-score.winner { color: #fcb514; }

  #screensaver {
    display: none; position: fixed; inset: 0; background: #000; z-index: 999;
    align-items: center; justify-content: center; flex-direction: column; gap: 8px; cursor: pointer;
  }
  #screensaver.active { display: flex; }
  #ss-clock { font-family: 'DM Mono', monospace; font-size: 12vw; font-weight: 300; color: rgba(255,255,255,0.15); letter-spacing: -4px; line-height: 1; }
  #ss-date { font-family: 'DM Mono', monospace; font-size: 2vw; color: rgba(255,255,255,0.08); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 14px; line-height: 1.4; }

  .screen { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr; padding: 1.2vw 1.4vw 1vw; gap: 1vh; }

  .topbar { display: grid; grid-template-columns: 1fr auto; align-items: center; }
  .clock-block { display: flex; align-items: baseline; gap: 0.8vw; }
  .clock { font-family: 'DM Mono', monospace; font-size: 1.7vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .clock-sub { font-family: 'DM Mono', monospace; font-size: 1.7vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .refresh-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.85vw; padding: 0.3vw 0.7vw; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.2s; }
  .refresh-btn:hover { color: var(--text); }

  .main { display: grid; grid-template-columns: 5fr 1fr; gap: 0.8vw; min-height: 0; min-width: 0; }
  .col { display: flex; flex-direction: column; gap: 0.8vw; min-height: 0; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 0.8vw; padding: 0.9vw 1vw; overflow: hidden; }
  .card-title { font-size: 0.8vw; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7vw; }

  .cal-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 0.8vw; padding: 0.9vw 1vw; display: flex; flex-direction: column; min-height: 0; flex: 1; overflow: hidden; }
  .cal-iframe-wrap { flex: 1; min-height: 0; border-radius: 6px; overflow: hidden; }
  .cal-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* Weather widget container */
  .wx-widget-wrap { width: 100%; height: 100%; overflow: hidden; }
  .wx-widget-wrap > div { width: 100% !important; height: 100% !important; }

  /* SCORES */
  .score-loading { font-size: 14px; color: var(--muted); text-align: center; padding: 10px 0; }
  .score-card { border-radius: 10px; overflow: hidden; }

  .score-card.mlb { background: #fef2f2; border: 0.5px solid rgba(189,48,57,0.25); }
  .score-card.mlb .sc-header { background: #bd3039; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.mlb .sc-league { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
  .score-card.mlb .sc-status { font-size: 12px; color: rgba(255,255,255,0.85); font-family: 'DM Mono', monospace; }
  .score-card.mlb .sc-body { padding: 10px 12px; }
  .score-card.mlb .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.mlb .sc-team:last-child { border-bottom: none; }
  .score-card.mlb .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.mlb .sc-abbr { color: #111; }
  .score-card.mlb .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.mlb .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.mlb .sc-score.winner { color: #bd3039; }

  .score-card.nba { background: #f0faf4; border: 0.5px solid rgba(0,122,51,0.25); }
  .score-card.nba .sc-header { background: linear-gradient(90deg, #007a33 0%, #005a25 100%); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.nba .sc-league { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #BA9A3C; }
  .score-card.nba .sc-status { font-size: 12px; color: rgba(255,255,255,0.9); font-family: 'DM Mono', monospace; }
  .score-card.nba .sc-body { padding: 10px 12px; }
  .score-card.nba .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.nba .sc-team:last-child { border-bottom: none; }
  .score-card.nba .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.nba .sc-abbr { color: #111; }
  .score-card.nba .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.nba .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.nba .sc-score.winner { color: #007a33; }

  .score-card.nhl { background: #f0f2ff; border: 0.5px solid rgba(22,43,94,0.2); }
  .score-card.nhl .sc-header { background: linear-gradient(90deg, #162b5e 0%, #0d1e42 100%); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; }
  .score-card.nhl .sc-league { font-size: 12px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #fcb514; }
  .score-card.nhl .sc-status { font-size: 12px; color: rgba(255,255,255,0.9); font-family: 'DM Mono', monospace; }
  .score-card.nhl .sc-body { padding: 10px 12px; }
  .score-card.nhl .sc-team { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid rgba(0,0,0,0.08); }
  .score-card.nhl .sc-team:last-child { border-bottom: none; }
  .score-card.nhl .sc-team-name { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 500; color: #333; }
  .score-card.nhl .sc-abbr { color: #111; }
  .score-card.nhl .sc-record { font-size: 12px; color: #888; font-weight: 400; }
  .score-card.nhl .sc-score { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: #777; }
  .score-card.nhl .sc-score.winner { color: #162b5e; }

  .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--surface2); border: 0.5px solid var(--border); cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
  .carousel-dot.active { background: var(--muted); }

  .cfg-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .cfg-overlay.open { display: flex; }
  .cfg-modal { background: var(--surface); border: 0.5px solid rgba(0,0,0,0.15); border-radius: 14px; padding: 24px; width: 460px; max-height: 88vh; overflow-y: auto; }
  .cfg-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 18px; }
  .cfg-section { margin-bottom: 16px; }
  .cfg-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .cfg-note { font-size: 13px; color: var(--dim); line-height: 1.6; margin-top: 4px; }
  .cfg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .cfg-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 7px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 8px 16px; cursor: pointer; }
  .cfg-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }

  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<script>
/* ---- CLOCK / MODE ---- */
function getMode(now) {
  const mins = now.getHours() * 60 + now.getMinutes();
  if (mins >= 7*60 && mins < 20*60) return 'light';
  if (mins >= 20*60 && mins < 22*60+30) return 'dark';
  return 'screensaver';
}

let _lastMode = null, _lastScheduledMode = null;
function checkMode() {
  const m = getMode(new Date());
  if (m === _lastScheduledMode) return;
  _lastScheduledMode = m; _lastMode = m;
  const html = document.documentElement, ss = document.getElementById('screensaver');
  if (m === 'screensaver') { html.classList.add('dark-mode'); ss.classList.add('active'); }
  else { ss.classList.remove('active'); m === 'dark' ? html.classList.add('dark-mode') : html.classList.remove('dark-mode'); }
}

function exitScreensaver() {
  document.getElementById('screensaver').classList.remove('active');
  setTimeout(() => { if (getMode(new Date()) === 'screensaver') document.getElementById('screensaver').classList.add('active'); }, 300000);
}

function openConfig() {
  const m = _lastMode || getMode(new Date());
  document.getElementById('override-light-btn').style.cssText = m === 'light' ? 'background:var(--blue);color:#fff' : '';
  document.getElementById('override-dark-btn').style.cssText = m === 'dark' ? 'background:var(--blue);color:#fff' : '';
  document.getElementById('cfg-overlay').classList.add('open');
}
function closeConfig() { document.getElementById('cfg-overlay').classList.remove('open'); }

function overrideMode(mode) {
  _lastMode = null;
  const html = document.documentElement, ss = document.getElementById('screensaver');
  if (mode === 'screensaver') { html.classList.add('dark-mode'); ss.classList.add('active'); _lastMode = 'screensaver'; closeConfig(); }
  else if (mode === 'dark') { ss.classList.remove('active'); html.classList.add('dark-mode'); _lastMode = 'dark'; }
  else { ss.classList.remove('active'); html.classList.remove('dark-mode'); _lastMode = 'light'; }
  document.getElementById('override-light-btn').style.cssText = mode === 'light' ? 'background:var(--blue);color:#fff' : '';
  document.getElementById('override-dark-btn').style.cssText = mode === 'dark' ? 'background:var(--blue);color:#fff' : '';
}

function tickClock() {
  const now = new Date();
  let h = now.getHours(), m = now.getMinutes();
  const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
  const timeStr = `${h}:${String(m).padStart(2,'0')} ${ap}`;
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dateStr = `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  document.getElementById('clock').textContent = timeStr;
  document.getElementById('datestr').textContent = dateStr;
  document.getElementById('ss-clock').textContent = timeStr;
  document.getElementById('ss-date').textContent = dateStr;
  checkMode();
}
setInterval(tickClock, 1000);
tickClock();

/* ---- CAROUSEL ---- */
const TEAMS = [
  { label: 'MLB · Red Sox',  league: 'mlb', abbrev: 'BOS', sport: 'baseball/mlb' },
  { label: 'NBA · Celtics',  league: 'nba', abbrev: 'BOS', sport: 'basketball/nba' },
  { label: 'NHL · Bruins',   league: 'nhl', abbrev: 'BOS', sport: 'hockey/nhl' },
];
let carouselIndex = 0;
let carouselCards = [null, null, null];
let carouselAutoTimer = null;

function renderDots() {
  const el = document.getElementById('carousel-dots');
  el.innerHTML = '';
  TEAMS.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'carousel-dot' + (i === carouselIndex ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    el.appendChild(dot);
  });
}

function showSlide(idx) {
  carouselIndex = ((idx % TEAMS.length) + TEAMS.length) % TEAMS.length;
  renderDots();
  const wrap = document.getElementById('scores-wrap');
  wrap.innerHTML = '';
  if (carouselCards[carouselIndex]) {
    wrap.appendChild(carouselCards[carouselIndex]);
  } else {
    wrap.innerHTML = '<div class="score-loading"><span class="spinner"></span></div>';
  }
}

function goToSlide(idx) { showSlide(idx); resetAutoAdvance(); }
function carouselNext() { goToSlide(carouselIndex + 1); }
function carouselPrev() { goToSlide(carouselIndex - 1); }

function resetAutoAdvance() {
  if (carouselAutoTimer) clearInterval(carouselAutoTimer);
  carouselAutoTimer = setInterval(() => {
    showSlide(carouselIndex + 1);
  }, 8000);
}

/* ---- SCORES ---- */
async function fetchScores() {
  await Promise.all(TEAMS.map(async (team, idx) => {
    try {
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${team.sport}/scoreboard`);
      const data = await res.json();
      const game = (data?.events || []).find(evt =>
        evt.competitions?.[0]?.competitors?.some(c => c.team?.abbreviation === team.abbrev)
      );
      if (game) {
        carouselCards[idx] = await buildScoreCard(game, team.label, team.league);
      } else {
        const el = document.createElement('div');
        el.className = 'score-loading';
        el.dataset.noGame = '1';
        el.textContent = 'No game today';
        carouselCards[idx] = el;
      }
    } catch(e) {
      const el = document.createElement('div');
      el.className = 'score-loading'; el.textContent = 'Unable to load';
      carouselCards[idx] = el;
    }
  }));
  showSlide(carouselIndex);
}

async function buildScoreCard(game, label, league) {
  const comp = game.competitions?.[0];
  const status = comp?.status?.type;
  const competitors = comp?.competitors || [];
  const home = competitors.find(c => c.homeAway === 'home');
  const away = competitors.find(c => c.homeAway === 'away');
  const t1 = away || competitors[0] || {}, t2 = home || competitors[1] || {};
  const s1 = parseInt(t1.score || 0), s2 = parseInt(t2.score || 0);
  const done = status?.completed, inProgress = status?.state === 'in';
  const showScore = done || inProgress;
  const n1 = t1.team?.abbreviation || '—', n2 = t2.team?.abbreviation || '—';
  const r1 = t1.records?.[0]?.summary || '', r2 = t2.records?.[0]?.summary || '';

  let statusLabel = '';
  if (done) statusLabel = 'Final';
  else if (inProgress) statusLabel = comp?.status?.detail || 'Live';
  else { const d = new Date(game.date); statusLabel = d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' }); }

  let liveHTML = '';
  if (inProgress) {
    try {
      const sportPath = league === 'mlb' ? 'baseball/mlb' : league === 'nba' ? 'basketball/nba' : 'hockey/nhl';
      const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/${sportPath}/summary?event=${game.id}`);
      const data = await res.json();

      if (league === 'mlb') {
        const sit = data.situation || {};
        const balls = sit.balls ?? '—', strikes = sit.strikes ?? '—', outs = sit.outs ?? '—';
        const inning = comp?.status?.detail || '';
        const athletes = data.boxscore?.players?.flatMap(t => t.statistics||[]).flatMap(s => s.athletes||[]) || [];
        const findName = id => athletes.find(a => String(a.athlete?.id) === String(id))?.athlete?.displayName || '—';
        const batter = findName(sit.batter?.playerId), pitcher = findName(sit.pitcher?.playerId);
        const onFirst = sit.onFirst ? 'var(--blue)' : 'var(--surface2)';
        const onSecond = sit.onSecond ? 'var(--blue)' : 'var(--surface2)';
        const onThird = sit.onThird ? 'var(--blue)' : 'var(--surface2)';
        liveHTML = `<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:12px;color:var(--muted)">${inning}</span>
            <span style="font-size:12px;color:var(--muted)">B${balls} S${strikes} O${outs}</span>
            <div style="position:relative;width:28px;height:28px;flex-shrink:0">
              <div style="position:absolute;top:0;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:${onSecond};border:1px solid var(--blue)"></div>
              <div style="position:absolute;top:50%;right:0;transform:translateY(-50%) rotate(45deg);width:9px;height:9px;background:${onFirst};border:1px solid var(--blue)"></div>
              <div style="position:absolute;top:50%;left:0;transform:translateY(-50%) rotate(45deg);width:9px;height:9px;background:${onThird};border:1px solid var(--blue)"></div>
              <div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%) rotate(45deg);width:9px;height:9px;background:var(--surface2);border:1px solid var(--blue)"></div>
            </div>
          </div>
          <div style="font-size:12px;color:var(--muted)">&#127921; <span style="color:var(--text)">${batter}</span></div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px">&#9917; <span style="color:var(--text)">${pitcher}</span></div>
        </div>`;
      } else if (league === 'nba' || league === 'nhl') {
        const period = comp?.status?.period || '—';
        const clock = comp?.status?.displayClock || '—';
        let periodLabel;
        if (league === 'nba') periodLabel = period===1?'1st':period===2?'2nd':period===3?'3rd':period===4?'4th':`OT${period-4}`;
        else periodLabel = period===1?'1st':period===2?'2nd':period===3?'3rd':'OT';
        liveHTML = `<div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">
          <div style="font-size:13px;color:var(--muted);text-align:center">${periodLabel} &middot; ${clock}</div>
        </div>`;
      }
    } catch(e) {}
  }

  const card = document.createElement('div');
  card.className = `score-card ${league}`;
  card.innerHTML = `
    <div class="sc-header">
      <span class="sc-league">${label}</span>
      <span class="sc-status">${statusLabel}</span>
    </div>
    <div class="sc-body">
      <div class="sc-team">
        <div class="sc-team-name"><span class="sc-abbr">${n1}</span>${r1?`<span class="sc-record">${r1}</span>`:''}</div>
        <span class="sc-score ${done&&s1>s2?'winner':''}">${showScore?s1:'—'}</span>
      </div>
      <div class="sc-team">
        <div class="sc-team-name"><span class="sc-abbr">${n2}</span>${r2?`<span class="sc-record">${r2}</span>`:''}</div>
        <span class="sc-score ${done&&s2>s1?'winner':''}">${showScore?s2:'—'}</span>
      </div>
      ${liveHTML}
    </div>`;
  return card;
}

/* ---- WEATHER REFRESH ---- */
function refreshWeather() {
  const wrap = document.querySelector('.wx-widget-wrap');
  const existing = wrap.querySelector('a.weatherwidget-io');
  if (existing) existing.remove();
  const a = document.createElement('a');
  a.className = 'weatherwidget-io';
  a.href = 'https://forecast7.com/en/40d88n73d91/10463/?unit=us';
  a.dataset.label_1 = 'BRONX';
  a.dataset.label_2 = 'WEATHER';
  a.dataset.days = '5';
  a.dataset.theme = 'weather_one';
  a.textContent = 'BRONX WEATHER';
  wrap.insertBefore(a, wrap.querySelector('script'));
  if (window.__weatherwidget_init) window.__weatherwidget_init();
}


/* ---- MAIN ---- */
async function refreshAll() {
  renderDots();
  await fetchScores();
}

resetAutoAdvance();
refreshAll();
setInterval(refreshAll, 15 * 60 * 1000);
setInterval(fetchScores, 30 * 1000);
setInterval(refreshWeather, 30 * 60 * 1000);

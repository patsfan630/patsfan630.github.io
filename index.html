<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366">
<title>Family Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaed;
    --border: rgba(0,0,0,0.1);
    --text: #1a1c22;
    --muted: #7a7f90;
    --dim: #9098a8;
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,0.1);
    --coral: #e05c2a;
    --red: #dc2626;
    --green: #16a34a;

    /* Red Sox Navy / Red */
    --sox-navy: #0d2b56;
    --sox-red: #bd3039;
    --sox-alt: #c8102e;
    --sox-gold: #e8b84b;
  }

  html.dark-mode {
    --bg: #0c0e14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --border: rgba(255,255,255,0.07);
    --text: #e2e5f0;
    --muted: #565c72;
    --dim: #363c50;
    --blue: #4f8ef7;
    --blue-dim: rgba(79,142,247,0.12);
    --coral: #f5875a;
    --red: #f06060;
    --green: #5dca7a;
  }
  html.dark-mode .clock,
  html.dark-mode .clock-sub { color: #e2e5f0; }

  #screensaver {
    display: none; position: fixed; inset: 0; background: #000; z-index: 999;
    align-items: center; justify-content: center; flex-direction: column; gap: 8px; cursor: pointer;
  }
  #screensaver.active { display: flex; }
  #ss-clock { font-family: 'DM Mono', monospace; font-size: 12vw; font-weight: 300; color: rgba(255,255,255,0.15); letter-spacing: -4px; line-height: 1; }
  #ss-date { font-family: 'DM Mono', monospace; font-size: 2vw; color: rgba(255,255,255,0.08); }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); font-family: 'DM Sans', sans-serif; color: var(--text); font-size: 14px; line-height: 1.4; }

  .screen { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr; padding: 0.7vw 1.4vw 0.6vw; gap: 0.5vh; }

  .topbar { display: grid; grid-template-columns: 1fr auto; align-items: center; }
  .clock-block { display: flex; align-items: baseline; gap: 0.8vw; }
  .clock { font-family: 'DM Mono', monospace; font-size: 1.3vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .clock-sub { font-family: 'DM Mono', monospace; font-size: 1.3vw; font-weight: 400; color: #1a1c22; letter-spacing: -1px; line-height: 1; }
  .topbar-right { display: flex; align-items: center; gap: 6px; }
  .refresh-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 0.72vw; padding: 0.2vw 0.6vw; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: color 0.2s; }
  .refresh-btn:hover { color: var(--text); }

  .main { display: grid; grid-template-columns: 5fr 1fr; gap: 0.8vw; min-height: 0; min-width: 0; }
  .col { display: flex; flex-direction: column; gap: 0.8vw; min-height: 0; }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 0.8vw; padding: 0.9vw 1vw; overflow: hidden; }
  .card-title { font-size: 0.8vw; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.7vw; }

  /* CALENDAR */
  .cal-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 0.8vw;
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
    overflow: hidden;
  }
  .cal-iframe-wrap { flex: 1; min-height: 0; overflow: hidden; }
  .cal-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ===================== WEATHER WIDGET ===================== */
  .wx-card {
    flex: 1;
    border-radius: 0.8vw;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
    border: 0.5px solid rgba(255,255,255,0.18);
    background: linear-gradient(160deg, #1a3a5c 0%, #1e4a7a 35%, #2a5fa0 65%, #1b3a62 100%);
    box-shadow: 0 4px 24px rgba(0,0,0,0.18);
  }
  .wx-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 120% 60% at 80% 20%, rgba(255,255,255,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 80% 40% at 10% 80%, rgba(100,160,255,0.08) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .wx-inner { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; padding: 10px 12px 8px; min-height: 0; }
  .wx-location-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
  .wx-location { font-size: 0.92vw; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.7); display: flex; align-items: center; gap: 4px; }
  .wx-updated { font-size: 0.78vw; color: rgba(255,255,255,0.35); font-family: 'DM Mono', monospace; }
  .wx-main-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; }
  .wx-temp-block { display: flex; flex-direction: column; }
  .wx-temp { font-size: 4.2vw; font-weight: 300; color: #fff; letter-spacing: -2px; line-height: 1; margin-bottom: 1px; }
  .wx-temp sup { font-size: 1.4vw; font-weight: 400; letter-spacing: 0; vertical-align: super; margin-left: 1px; }
  .wx-condition { font-size: 1.0vw; color: rgba(255,255,255,0.85); font-weight: 400; margin-top: 2px; }
  .wx-feels { font-size: 0.88vw; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .wx-icon-wrap { display: flex; align-items: center; justify-content: center; width: 3vw; height: 3vw; flex-shrink: 0; }
  .wx-details-row { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .wx-detail-pill { display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 3px 9px; font-size: 0.82vw; color: rgba(255,255,255,0.8); }
  .wx-divider-row { display: flex; align-items: center; margin-bottom: 6px; flex-shrink: 0; }
  .wx-divider { height: 0.5px; background: rgba(255,255,255,0.15); flex-shrink: 0; }
  .wx-forecast { display: flex; gap: 4px; flex: 1; min-height: 0; }
  .wx-day { flex: 1; background: rgba(255,255,255,0.07); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px 4px; gap: 2px; border: 0.5px solid rgba(255,255,255,0.1); }
  .wx-day-name { font-size: 0.8vw; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.6); }
  .wx-day-icon { width: 1.9vw; height: 1.9vw; display: flex; align-items: center; justify-content: center; }
  .wx-day-hi { font-size: 1.05vw; font-weight: 500; color: #fff; line-height: 1; }
  .wx-day-lo { font-size: 0.88vw; color: rgba(255,255,255,0.45); line-height: 1; }
  .wx-precip { display: flex; align-items: center; gap: 3px; font-size: 0.76vw; color: rgba(130,200,255,0.85); }
  .wx-loading { flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 0.75vw; gap: 8px; }
  .wx-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: rgba(255,255,255,0.6); border-radius: 50%; animation: wxspin 0.8s linear infinite; }
  @keyframes wxspin { to { transform: rotate(360deg); } }
  html.dark-mode .wx-card { background: linear-gradient(160deg, #0f2540 0%, #143560 35%, #1c4a80 65%, #0e2440 100%); }

  /* ===================== MLB CARD ===================== */
  .mlb-card {
    flex: 1;
    border-radius: 0.8vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: linear-gradient(170deg, #7a0d18 0%, #9e1422 50%, #7a0d18 100%);
    border: 0.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 4px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative;
  }
  .mlb-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, #0d2b56, #e8b84b, #0d2b56);
    z-index: 2;
  }
  .mlb-inner { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; padding: 10px 12px 10px; min-height: 0; overflow-y: auto; gap: 8px; }

  .mlb-loading { flex: 1; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.3); font-size: 0.75vw; gap: 8px; flex-direction: column; }
  .mlb-spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: rgba(232,184,75,0.9); border-radius: 50%; animation: mlbspin 0.8s linear infinite; }
  @keyframes mlbspin { to { transform: rotate(360deg); } }

  .mlb-teams { display: flex; flex-direction: column; gap: 2px; }
  .mlb-team-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 8px; border-radius: 6px; transition: background 0.2s; }
  .mlb-team-row.winner { background: rgba(232,184,75,0.08); }
  .mlb-team-left { display: flex; align-items: center; gap: 6px; }
  .mlb-team-name { font-size: 1.0vw; font-weight: 500; color: #fff; letter-spacing: -0.02em; }
  .mlb-team-record { font-size: 0.72vw; color: rgba(255,255,255,0.35); font-family: 'DM Mono', monospace; }
  .mlb-team-score { font-family: 'DM Mono', monospace; font-size: 1.8vw; font-weight: 500; color: rgba(255,255,255,0.3); line-height: 1; }
  .mlb-team-score.live { color: #fff; }
  .mlb-team-score.winner { color: var(--sox-gold); }

  .mlb-status-bar { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 3px 0; }
  .mlb-status-label { font-size: 0.78vw; font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; }
  .mlb-status-live { color: #fff; font-weight: 600; animation: pulse-red 1.5s ease-in-out infinite; }
  @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .mlb-divider { height: 0.5px; background: rgba(255,255,255,0.08); flex-shrink: 0; }

  /* Linescore */
  .mlb-linescore { overflow-x: auto; flex-shrink: 0; }
  .mlb-linescore table { width: 100%; border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 0.7vw; }
  .mlb-linescore th { color: rgba(255,255,255,0.3); font-weight: 400; text-align: center; padding: 2px 3px; min-width: 16px; border-bottom: 0.5px solid rgba(255,255,255,0.08); }
  .mlb-linescore th.ls-team-h { text-align: left; min-width: 28px; padding-left: 2px; }
  .mlb-linescore td { text-align: center; padding: 3px 3px; color: rgba(255,255,255,0.6); }
  .mlb-linescore td.ls-team { text-align: left; font-family: 'DM Sans', sans-serif; font-size: 0.7vw; font-weight: 500; color: rgba(255,255,255,0.4); padding-left: 2px; }
  .mlb-linescore td.ls-cur { background: rgba(13,43,86,0.75); color: #fff; font-weight: 600; border-radius: 3px; }
  .mlb-linescore td.ls-total { font-weight: 600; color: #fff; border-left: 0.5px solid rgba(255,255,255,0.12); }
  .mlb-linescore td.ls-winner-cell { color: var(--sox-gold); }
  .mlb-linescore td.ls-empty { color: rgba(255,255,255,0.15); }

  /* Situation */
  .mlb-situation { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .mlb-diamond-wrap { flex-shrink: 0; }
  .mlb-situation-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .mlb-count-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .mlb-count-pill { display: flex; align-items: center; gap: 3px; background: rgba(255,255,255,0.07); border-radius: 20px; padding: 2px 7px; font-size: 0.72vw; color: rgba(255,255,255,0.6); font-family: 'DM Mono', monospace; }
  .mlb-count-pill span.val { color: #fff; font-weight: 600; }
  .mlb-player-row { display: flex; align-items: center; gap: 5px; font-size: 0.75vw; }
  .mlb-player-lbl { color: rgba(255,255,255,0.35); min-width: 40px; text-transform: uppercase; letter-spacing: 0.07em; font-size: 0.68vw; }
  .mlb-player-name { color: rgba(255,255,255,0.9); font-weight: 500; }
  .mlb-half-inning { font-size: 0.72vw; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.1em; font-family: 'DM Mono', monospace; padding-bottom: 2px; }

  /* Probable starters */
  .mlb-starters { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .mlb-starters-label { font-size: 0.65vw; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.35); font-weight: 600; margin-bottom: 1px; }
  .mlb-starter-row { display: flex; align-items: center; gap: 6px; font-size: 0.75vw; padding: 3px 6px; border-radius: 5px; background: rgba(255,255,255,0.06); }
  .mlb-starter-team { font-size: 0.65vw; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(255,255,255,0.4); min-width: 26px; font-family: 'DM Mono', monospace; }
  .mlb-starter-name { color: rgba(255,255,255,0.9); font-weight: 500; flex: 1; }
  .mlb-starter-era  { font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.35); font-size: 0.68vw; }

  /* Pitchers */
  .mlb-pitchers { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
  .mlb-pitcher-row { display: flex; align-items: center; gap: 6px; font-size: 0.75vw; padding: 4px 6px; border-radius: 5px; background: rgba(255,255,255,0.04); }
  .mlb-pitcher-badge { font-size: 0.65vw; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; padding: 1px 5px; border-radius: 3px; flex-shrink: 0; }
  .mlb-pitcher-badge.win  { background: rgba(93,202,122,0.2); color: #5dca7a; }
  .mlb-pitcher-badge.loss { background: rgba(240,96,96,0.2);  color: #f06060; }
  .mlb-pitcher-badge.save { background: rgba(232,184,75,0.2); color: var(--sox-gold); }
  .mlb-pitcher-name   { color: rgba(255,255,255,0.9); font-weight: 500; flex: 1; }
  .mlb-pitcher-record { font-family: 'DM Mono', monospace; color: rgba(255,255,255,0.4); font-size: 0.68vw; }

  /* Next game */
  .mlb-next { display: flex; flex-direction: column; gap: 3px; padding: 6px 8px; background: rgba(255,255,255,0.04); border-radius: 6px; border: 0.5px solid rgba(255,255,255,0.07); flex-shrink: 0; }
  .mlb-next-label { font-size: 0.65vw; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.3); font-weight: 600; }
  .mlb-next-info  { font-size: 0.8vw; color: rgba(255,255,255,0.8); font-weight: 500; }
  .mlb-next-detail { font-size: 0.72vw; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; }

  /* No game */
  .mlb-nogame { flex: 1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; }
  .mlb-nogame-icon { font-size: 1.8vw; opacity: 0.25; }
  .mlb-nogame-text { font-size: 0.8vw; color: rgba(255,255,255,0.3); }

  /* =================== END MLB =================== */

  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .cfg-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .cfg-overlay.open { display: flex; }
  .cfg-modal { background: var(--surface); border: 0.5px solid rgba(0,0,0,0.15); border-radius: 14px; padding: 24px; width: 500px; max-height: 88vh; overflow-y: auto; }
  .cfg-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 18px; }
  .cfg-section { margin-bottom: 16px; }
  .cfg-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-weight: 500; }
  .cfg-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .cfg-btn { background: var(--surface2); border: 0.5px solid var(--border); border-radius: 7px; color: var(--text); font-size: 14px; font-family: 'DM Sans', sans-serif; padding: 8px 16px; cursor: pointer; }
  .cfg-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
</style>
</head>
<body>
<div class="screen">
  <div class="topbar">
    <div class="clock-block">
      <div class="clock" id="clock">--:-- --</div>
      <div class="clock-sub" id="datestr">Loading...</div>
    </div>
    <div class="topbar-right">
      <button class="refresh-btn" onclick="refreshAll()">&#8635; Refresh</button>
      <button class="refresh-btn" onclick="openConfig()">&#9881; Setup</button>
    </div>
  </div>

  <div class="main">
    <!-- CALENDAR -->
    <div class="cal-card">
      <div class="cal-iframe-wrap">
        <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FNew_York&showPrint=0&mode=WEEK&showTz=0&showDate=0&showTitle=0&src=ZmFtaWx5MDYwNzE3Njg5ODMyNzQzNDE1NTVAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=M2xtZWw0aTlzNDk4NnNvcnBla2cyc3Q4ZWtAZ3JvdXAuY2FsZW5kYXIuZ29vZ2xlLmNvbQ&src=Z3F2dWJoMzMwcHNnNjNvaGZhZXFkZWxiczA0bGxhY3JAaW1wb3J0LmNhbGVuZGFyLmdvb2dsZS5jb20&src=ZW4udXNhI2hvbGlkYXlAZ3JvdXAudi5jYWxlbmRhci5nb29nbGUuY29t&src=Y19mYWY5OTAwZjdhZmRjZmU2NjY3MTQ1Y2MxMjZlNWY5YmQ1NmY5NmRjZTg2NmU3NTE0MzJmZWExMTIwMzUwMzY4QGdyb3VwLmNhbGVuZGFyLmdvb2dsZS5jb20&color=%237986cb&color=%238e24aa&color=%233f51b5&color=%237cb342&color=%23ad1457" style="border-width:0;width:100%;height:100%;display:block" frameborder="0" scrolling="no"></iframe>
      </div>
    </div>

    <div class="col">
      <!-- WEATHER -->
      <div class="wx-card">
        <div class="wx-inner" id="wx-inner">
          <div class="wx-loading"><div class="wx-spinner"></div><span>Loading weather...</span></div>
        </div>
      </div>

      <!-- MLB CARD -->
      <div class="mlb-card">
        <div class="mlb-inner" id="mlb-inner">
          <div class="mlb-loading"><div class="mlb-spinner"></div><span style="font-size:0.72vw;color:rgba(255,255,255,0.3)">Loading Red Sox...</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="cfg-overlay" id="cfg-overlay">
  <div class="cfg-modal">
    <div class="cfg-title">Dashboard Setup</div>
    <div class="cfg-section">
      <div class="cfg-label">Display Override</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="cfg-btn" id="override-light-btn" onclick="overrideMode('light')">&#9728; Light</button>
        <button class="cfg-btn" id="override-dark-btn"  onclick="overrideMode('dark')">&#9790; Dark</button>
        <button class="cfg-btn" onclick="overrideMode('screensaver')">&#128164; Screensaver</button>
      </div>
    </div>
    <div class="cfg-actions">
      <button class="cfg-btn primary" onclick="closeConfig()">Close</button>
    </div>
  </div>
</div>

<div id="screensaver" onclick="exitScreensaver()">
  <div id="ss-clock">--:-- --</div>
  <div id="ss-date"></div>
</div>

<script>
/* ================================================================
   CLOCK / MODE
   ================================================================ */
function getMode(now){const m=now.getHours()*60+now.getMinutes();if(m>=7*60&&m<20*60)return'light';if(m>=20*60&&m<22*60+30)return'dark';return'screensaver';}
let _lastScheduledMode=null,_manualOverride=null;
function applyMode(m){const h=document.documentElement,ss=document.getElementById('screensaver');if(m==='screensaver'){h.classList.add('dark-mode');ss.classList.add('active');}else{ss.classList.remove('active');m==='dark'?h.classList.add('dark-mode'):h.classList.remove('dark-mode');}}
function checkMode(){if(_manualOverride)return;const m=getMode(new Date());if(m===_lastScheduledMode)return;_lastScheduledMode=m;applyMode(m);}
function exitScreensaver(){document.getElementById('screensaver').classList.remove('active');setTimeout(()=>{if(!_manualOverride&&getMode(new Date())==='screensaver')document.getElementById('screensaver').classList.add('active');},300000);}
function openConfig(){const m=_manualOverride||getMode(new Date());document.getElementById('override-light-btn').style.cssText=m==='light'?'background:var(--blue);color:#fff':'';document.getElementById('override-dark-btn').style.cssText=m==='dark'?'background:var(--blue);color:#fff':'';document.getElementById('cfg-overlay').classList.add('open');}

/* ================================================================
   MLB — ESPN API   (Red Sox = team id 2)
   ================================================================

   ESPN public endpoints used:
     Scoreboard (today):
       https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard
     Summary (live + box score detail):
       https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/summary?event={id}
     Team schedule (upcoming games):
       https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams/bos/schedule

   Retention rule: show the completed game until 11 AM the next calendar day.
   ================================================================ */

const ESPN_BASE    = 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb';
const SOX_ESPN_ID  = '2';   // ESPN internal team ID for Boston Red Sox
const SOX_ABBR     = 'BOS';

/**
 * Returns true if a completed game should still be displayed.
 * A game stays visible until 11:00 AM on the day after it was played.
 * gameDate: ISO date string (YYYY-MM-DD) for the date the game was played.
 */
function withinRetentionWindow(gameDate) {
  if (!gameDate) return false;
  // Parse the game date as a local-time date (no time zone shift)
  const parts  = gameDate.split('-').map(Number);
  const nextDay = new Date(parts[0], parts[1] - 1, parts[2] + 1, 11, 0, 0); // next day at 11 AM local
  return Date.now() < nextDay.getTime();
}

/** Format a game date/time string for display (e.g. "Sat, May 17 · 7:10 PM ET"). */
function fmtGameTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.toLocaleString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric',
    hour: 'numeric', minute: '2-digit',
    timeZoneName: 'short', timeZone: 'America/New_York'
  });
}

/** Format a date string (YYYY-MM-DD) for a short "Mon, May 19" style. */
function fmtDateShort(dateStr) {
  if (!dateStr) return '';
  const [y, m, day] = dateStr.split('-').map(Number);
  const d = new Date(y, m - 1, day);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

/** Today's date as YYYY-MM-DD in local time. */
function localToday() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

/** Yesterday's date as YYYY-MM-DD in local time. */
function localYesterday() {
  const n = new Date();
  n.setDate(n.getDate() - 1);
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

/* ────────────────────────────────────────────────────────────────
   findSoxGame(scoreboard)
   Searches the scoreboard's events array for a Red Sox game.
   Returns the competition object (first match) or null.
──────────────────────────────────────────────────────────────── */
function findSoxGame(events) {
  for (const event of (events || [])) {
    const comp = event.competitions?.[0];
    if (!comp) continue;
    const hasSox = comp.competitors?.some(c => c.team?.abbreviation === SOX_ABBR || c.team?.id === SOX_ESPN_ID);
    if (hasSox) return { event, comp };
  }
  return null;
}

/* ────────────────────────────────────────────────────────────────
   Main fetch
──────────────────────────────────────────────────────────────── */
async function fetchMLB() {
  const inner = document.getElementById('mlb-inner');
  try {
    const today     = localToday();
    const yesterday = localYesterday();

    // 1. Fetch today's scoreboard + yesterday's scoreboard + upcoming schedule in parallel
    const [todayRes, yestRes, schedRes] = await Promise.all([
      fetch(`${ESPN_BASE}/scoreboard?dates=${today.replace(/-/g,'')}`),
      fetch(`${ESPN_BASE}/scoreboard?dates=${yesterday.replace(/-/g,'')}`),
      fetch(`${ESPN_BASE}/teams/bos/schedule?season=${today.slice(0,4)}`),
    ]);
    const [todayData, yestData, schedData] = await Promise.all([
      todayRes.json(), yestRes.json(), schedRes.json()
    ]);

    // 2. Find Sox game
    let found      = findSoxGame(todayData.events);
    let isYesterday = false;
    let gameDate    = today;

    if (!found) {
      // No game today — check yesterday (retention window)
      const yFound = findSoxGame(yestData.events);
      if (yFound) {
        const st = yFound.comp.status?.type?.state;  // 'post' = finished
        if (st === 'post' && withinRetentionWindow(yesterday)) {
          found       = yFound;
          isYesterday = true;
          gameDate    = yesterday;
        }
      }
    }

    // 3. Find next upcoming game from schedule
    const nextGame = findNextGame(schedData, today);

    if (!found) {
      renderNoGame(inner, nextGame);
      return;
    }

    const { event, comp } = found;
    const statusState  = comp.status?.type?.state;     // 'pre' | 'in' | 'post'
    const statusDetail = comp.status?.type?.shortDetail || comp.status?.type?.detail || '';
    const isLive    = statusState === 'in';
    const isFinal   = statusState === 'post';
    const isPreview = statusState === 'pre';

    // Teams — ESPN always puts home second in competitors array, but we detect explicitly
    const awayComp = comp.competitors?.find(c => c.homeAway === 'away') || comp.competitors?.[0];
    const homeComp = comp.competitors?.find(c => c.homeAway === 'home') || comp.competitors?.[1];

    const awayName   = awayComp?.team?.shortDisplayName || awayComp?.team?.displayName || '—';
    const homeName   = homeComp?.team?.shortDisplayName || homeComp?.team?.displayName || '—';
    const awayAbbr   = awayComp?.team?.abbreviation || '—';
    const homeAbbr   = homeComp?.team?.abbreviation || '—';
    const awayRecord = awayComp?.records?.[0]?.summary || '';
    const homeRecord = homeComp?.records?.[0]?.summary || '';
    const awayScore  = awayComp?.score ?? '—';
    const homeScore  = homeComp?.score ?? '—';

    const awayWin = isFinal && parseInt(awayScore) > parseInt(homeScore);
    const homeWin = isFinal && parseInt(homeScore) > parseInt(awayScore);

    // 4. Fetch detailed summary for live/final (linescore, situation, decisions)
    // Also fetch summary for preview so we can get probable pitchers with ERA
    let summary = null;
    if (event.id) {
      try {
        const sumRes = await fetch(`${ESPN_BASE}/summary?event=${event.id}`);
        summary = await sumRes.json();
      } catch(e) { /* degrade gracefully */ }
    }

    // ── Probable starters ───────────────────────────────────────────────────
    // ESPN surfaces probables in comp.probables[] or summary.header.competitions[0].probables[]
    // Each probable: { athlete: { fullName, era }, team: { abbreviation } }
    let awayStarter = null, homeStarter = null;
    const probSources = [
      ...(comp.probables || []),
      ...(summary?.header?.competitions?.[0]?.probables || []),
      ...(summary?.probables || []),
    ];
    for (const p of probSources) {
      const abbr = p.athlete?.team?.abbreviation || p.team?.abbreviation || '';
      const name = p.athlete?.fullName || p.athlete?.displayName || p.displayName || '';
      const era  = p.athlete?.era ?? p.athlete?.statistics?.find?.(s => s.name === 'ERA')?.value ?? p.era ?? null;
      const eraStr = era != null ? parseFloat(era).toFixed(2) : '';
      if (!name) continue;
      // Match to away/home by team abbreviation
      if (abbr === awayAbbr && !awayStarter) awayStarter = { name, era: eraStr };
      else if (abbr === homeAbbr && !homeStarter) homeStarter = { name, era: eraStr };
      else if (!awayStarter) awayStarter = { name, era: eraStr };
      else if (!homeStarter) homeStarter = { name, era: eraStr };
    }

    // ── Extract data from summary ────────────────────────────────────────────

    // Linescore: summary.linescore.lines  (array of inning objects)
    //   Each line: { inning: "1", away: { runs:"0" }, home: { runs:"—" } }
    const linescore   = summary?.linescore;
    const lsLines     = linescore?.lines || [];  // per-inning half-inning data

    // Totals from linescore
    const lsAwayTotals = linescore?.teams?.find(t => t.homeAway === 'away') || {};
    const lsHomeTotals = linescore?.teams?.find(t => t.homeAway === 'home') || {};
    const totalAwayR = lsAwayTotals.runs   ?? awayScore;
    const totalHomeR = lsHomeTotals.runs   ?? homeScore;
    const totalAwayH = lsAwayTotals.hits   ?? '—';
    const totalHomeH = lsHomeTotals.hits   ?? '—';
    const totalAwayE = lsAwayTotals.errors ?? '—';
    const totalHomeE = lsHomeTotals.errors ?? '—';

    // Current inning info
    const situation    = summary?.situation;
    const currentInn   = isLive ? (situation?.period || comp.status?.period || 0) : 0;
    const isTop        = isLive ? (situation?.isTopHalf !== false && situation?.pitcher?.team?.abbreviation !== homeAbbr) : true;
    // ESPN's situation.isTopHalf is a boolean when present
    const isTopHalf    = isLive ? (situation?.isTopHalf ?? true) : true;

    // Pitching/batting situation
    const balls    = situation?.balls    ?? '—';
    const strikes  = situation?.strikes  ?? '—';
    const outs     = situation?.outs     ?? '—';
    const batterName  = situation?.batter?.fullName  || situation?.batter?.athlete?.fullName  || '—';
    const pitcherName = situation?.pitcher?.fullName || situation?.pitcher?.athlete?.fullName || '—';
    const onFirst  = situation?.onFirst  || false;
    const onSecond = situation?.onSecond || false;
    const onThird  = situation?.onThird  || false;

    // Decisions (from summary.boxscore or summary.header.competitions[0])
    const decisionsComp = summary?.header?.competitions?.[0];
    const decisions = {
      winner: decisionsComp?.competitors?.find(c => c.winner)?.probables?.find(p => p.type === 'winning') ||
              summary?.boxscore?.teams?.flatMap(t => t.statistics || []).find(s => s.type === 'winning') ||
              null,
      // We parse pitchers from the leaders / lastEvent sections below
    };

    // ESPN surfaces W/L/SV in summary.boxscore.players[].statistics[pitching category]
    // More reliably, we pull from summary.leaders or from the loser/winner in the header
    let winPitcher = null, lossPitcher = null, savePitcher = null;
    if (isFinal && summary) {
      // Try header.competitions[0].situation for pitchers
      const hdrSit = summary?.header?.competitions?.[0]?.situation;
      if (hdrSit) {
        winPitcher  = hdrSit.lastPlay?.participants?.find(p => p.type === 'winner')  || null;
        lossPitcher = hdrSit.lastPlay?.participants?.find(p => p.type === 'loser')   || null;
        savePitcher = hdrSit.lastPlay?.participants?.find(p => p.type === 'saver')   || null;
      }

      // Most reliable: summary.boxscore.players → pitching decisions
      // ESPN places W/L/S in the stat line. We scan all pitchers.
      if (summary.boxscore?.players) {
        for (const teamBlock of summary.boxscore.players) {
          const pitchersGroup = teamBlock.statistics?.find(s => s.type === 'pitching');
          if (!pitchersGroup) continue;
          for (const athlete of (pitchersGroup.athletes || [])) {
            const note = athlete.stats?.[athlete.stats.length - 1] || '';   // Last stat column is often "note" W/L/S
            const statLabels = pitchersGroup.labels || pitchersGroup.keys || [];
            const noteIdx = statLabels.indexOf('note');
            const statNote = noteIdx >= 0 ? (athlete.stats?.[noteIdx] || '') : '';
            const nm = athlete.athlete?.displayName || athlete.athlete?.fullName || '';

            // Also look for season W-L from seasonStats
            const seasonWins   = athlete.athlete?.statisticsSummary?.wins   ?? '';
            const seasonLosses = athlete.athlete?.statisticsSummary?.losses ?? '';
            const seasonSaves  = athlete.athlete?.statisticsSummary?.saves  ?? '';

            if (/\bW\b/.test(statNote) && !winPitcher)  winPitcher  = { name: nm, record: seasonWins && seasonLosses ? `${seasonWins}-${seasonLosses}` : '' };
            if (/\bL\b/.test(statNote) && !lossPitcher) lossPitcher = { name: nm, record: seasonWins && seasonLosses ? `${seasonWins}-${seasonLosses}` : '' };
            if (/\bS\b/.test(statNote) && !savePitcher) savePitcher = { name: nm, saves: seasonSaves || '' };
          }
        }
      }

      // Final fallback: summary.notes or summary.pitchingLeaders
      if (!winPitcher && summary.winningPitcher) {
        winPitcher = { name: summary.winningPitcher.displayName || '', record: '' };
      }
      if (!lossPitcher && summary.losingPitcher) {
        lossPitcher = { name: summary.losingPitcher.displayName || '', record: '' };
      }
    }

    // ── Build HTML ───────────────────────────────────────────────────────────
    let html = '';

    // ▸ Team rows + scores
    html += `<div class="mlb-teams">`;
    html += teamRow(awayName, awayAbbr, awayRecord, awayScore, isPreview, awayWin, isLive || isFinal);
    html += teamRow(homeName, homeAbbr, homeRecord, homeScore, isPreview, homeWin, isLive || isFinal);
    html += `</div>`;

    // ▸ Status bar
    if (isPreview) {
      html += `<div class="mlb-status-bar"><span class="mlb-status-label">${fmtGameTime(event.date)}</span></div>`;
    } else if (isLive) {
      const halfWord  = isTopHalf ? 'TOP' : 'BOT';
      const inningNum = comp.status?.period || '?';
      html += `<div class="mlb-status-bar">
        <span class="mlb-status-live">&#9679; LIVE</span>
        <span class="mlb-status-label">${halfWord} ${inningNum}</span>
      </div>`;
    } else if (isFinal) {
      // ESPN statusDetail is often "Final" or "Final/10" for extras
      const dayNote = isYesterday ? ' &middot; Yesterday' : '';
      html += `<div class="mlb-status-bar"><span class="mlb-status-label">${statusDetail}${dayNote}</span></div>`;
    }

    html += `<div class="mlb-divider"></div>`;

    // ▸ Probable starters (pre-game only — live/final rely on actual matchup data)
    if (isPreview && (awayStarter || homeStarter)) {
      html += `<div class="mlb-starters">
        <div class="mlb-starters-label">Probable Starters</div>`;
      if (awayStarter) {
        html += `<div class="mlb-starter-row">
          <span class="mlb-starter-team">${awayAbbr}</span>
          <span class="mlb-starter-name">${awayStarter.name}</span>
          ${awayStarter.era ? `<span class="mlb-starter-era">${awayStarter.era} ERA</span>` : ''}
        </div>`;
      }
      if (homeStarter) {
        html += `<div class="mlb-starter-row">
          <span class="mlb-starter-team">${homeAbbr}</span>
          <span class="mlb-starter-name">${homeStarter.name}</span>
          ${homeStarter.era ? `<span class="mlb-starter-era">${homeStarter.era} ERA</span>` : ''}
        </div>`;
      }
      html += `</div>`;
    }

    // ▸ Linescore table (live or final)
    if ((isLive || isFinal) && lsLines.length > 0) {
      const totalInn = Math.max(lsLines.length, 9);
      html += buildLinescoreTable(lsLines, totalInn, awayAbbr, homeAbbr,
        totalAwayR, totalHomeR, totalAwayH, totalHomeH, totalAwayE, totalHomeE,
        isLive, currentInn, isTopHalf, awayWin, homeWin);
    }

    // ▸ Live situation block
    if (isLive && situation) {
      const halfLabel = isTopHalf ? 'Top' : 'Bot';
      const inningOrd = ordinal(comp.status?.period || currentInn || 1);
      html += `<div class="mlb-divider"></div>
      <div class="mlb-situation">
        <div class="mlb-diamond-wrap">${diamondSVG(onFirst, onSecond, onThird)}</div>
        <div class="mlb-situation-info">
          <div class="mlb-half-inning">${halfLabel} ${inningOrd} Inning</div>
          <div class="mlb-count-row">
            <div class="mlb-count-pill">B <span class="val">${balls}</span></div>
            <div class="mlb-count-pill">S <span class="val">${strikes}</span></div>
            <div class="mlb-count-pill">O <span class="val">${outs}</span></div>
          </div>
          <div class="mlb-player-row">
            <span class="mlb-player-lbl">Batter</span>
            <span class="mlb-player-name">${batterName}</span>
          </div>
          <div class="mlb-player-row">
            <span class="mlb-player-lbl">Pitcher</span>
            <span class="mlb-player-name">${pitcherName}</span>
          </div>
        </div>
      </div>`;
    }

    // ▸ Post-game decisions
    if (isFinal && (winPitcher || lossPitcher || savePitcher)) {
      html += `<div class="mlb-divider"></div><div class="mlb-pitchers">`;
      if (winPitcher) {
        html += `<div class="mlb-pitcher-row">
          <span class="mlb-pitcher-badge win">W</span>
          <span class="mlb-pitcher-name">${winPitcher.name}</span>
          <span class="mlb-pitcher-record">${winPitcher.record || ''}</span>
        </div>`;
      }
      if (lossPitcher) {
        html += `<div class="mlb-pitcher-row">
          <span class="mlb-pitcher-badge loss">L</span>
          <span class="mlb-pitcher-name">${lossPitcher.name}</span>
          <span class="mlb-pitcher-record">${lossPitcher.record || ''}</span>
        </div>`;
      }
      if (savePitcher) {
        html += `<div class="mlb-pitcher-row">
          <span class="mlb-pitcher-badge save">SV</span>
          <span class="mlb-pitcher-name">${savePitcher.name}</span>
          <span class="mlb-pitcher-record">${savePitcher.saves ? `${savePitcher.saves} SV` : ''}</span>
        </div>`;
      }
      html += `</div>`;
    }

    // ▸ Next game (shown once a completed game is the current display)
    if (isFinal && nextGame) {
      html += `<div class="mlb-divider"></div>`;
      html += buildNextGameBlock(nextGame);
    }

    inner.innerHTML = html;

  } catch(e) {
    document.getElementById('mlb-inner').innerHTML =
      `<div class="mlb-loading"><span style="font-size:1.2vw;opacity:0.4">&#9888;</span><span>Unable to load game data</span></div>`;
    console.error('ESPN MLB fetch error:', e);
  }
}

/* ────────────────────────────────────────────────────────────────
   Helper: single team row
──────────────────────────────────────────────────────────────── */
function teamRow(name, abbr, record, score, isPreview, isWinner, scoreVisible) {
  const scoreClass = isPreview ? '' : (isWinner ? 'winner' : 'live');
  return `<div class="mlb-team-row ${isWinner ? 'winner' : ''}">
    <div class="mlb-team-left">
      <div>
        <div class="mlb-team-name">${name}</div>
        ${record ? `<div class="mlb-team-record">${abbr} &middot; ${record}</div>` : ''}
      </div>
    </div>
    <div class="mlb-team-score ${scoreClass}">${isPreview ? '&mdash;' : score}</div>
  </div>`;
}

/* ────────────────────────────────────────────────────────────────
   Helper: linescore table
   ESPN linescore.lines format:
     { displayValue: "1", away: { runs: "0", hits: "1", errors: "0" },
       home: { runs: "—", hits: "0", errors: "0" } }
──────────────────────────────────────────────────────────────── */
function buildLinescoreTable(lines, totalInn, awayAbbr, homeAbbr,
    awayR, homeR, awayH, homeH, awayE, homeE,
    isLive, currentInn, isTopHalf, awayWin, homeWin) {

  // Build a map from inning number (1-based) to the ESPN line object
  const lineMap = {};
  lines.forEach(l => { lineMap[parseInt(l.displayValue || l.inning || 0)] = l; });

  let awayRow = '', homeRow = '';
  for (let i = 1; i <= totalInn; i++) {
    const line = lineMap[i];
    const awayRuns = line ? (line.away?.runs ?? '') : '';
    const homeRuns = line ? (line.home?.runs ?? '') : '';

    // Highlight current inning half
    const awayCur = isLive && i === currentInn && isTopHalf;
    const homeCur = isLive && i === currentInn && !isTopHalf;

    const awayVal = awayCur && awayRuns === '' ? '&bull;' : (awayRuns === '' ? '&mdash;' : awayRuns);
    const homeVal = homeCur && homeRuns === '' ? '&bull;' : (homeRuns === '' ? '&mdash;' : homeRuns);

    awayRow += `<td class="${awayCur ? 'ls-cur' : (awayRuns === '' ? 'ls-empty' : '')}">${awayVal}</td>`;
    homeRow += `<td class="${homeCur ? 'ls-cur' : (homeRuns === '' ? 'ls-empty' : '')}">${homeVal}</td>`;
  }

  return `<div class="mlb-linescore"><table>
    <thead><tr>
      <th class="ls-team-h"></th>
      ${Array.from({length:totalInn},(_,i) => `<th>${i+1}</th>`).join('')}
      <th class="ls-team-h" style="border-left:0.5px solid rgba(255,255,255,0.12)">R</th>
      <th class="ls-team-h">H</th>
      <th class="ls-team-h">E</th>
    </tr></thead>
    <tbody>
      <tr>
        <td class="ls-team">${awayAbbr}</td>
        ${awayRow}
        <td class="ls-total ${awayWin ? 'ls-winner-cell' : ''}">${awayR}</td>
        <td class="ls-total">${awayH}</td>
        <td class="ls-total">${awayE}</td>
      </tr>
      <tr>
        <td class="ls-team">${homeAbbr}</td>
        ${homeRow}
        <td class="ls-total ${homeWin ? 'ls-winner-cell' : ''}">${homeR}</td>
        <td class="ls-total">${homeH}</td>
        <td class="ls-total">${homeE}</td>
      </tr>
    </tbody>
  </table></div>`;
}

/* ────────────────────────────────────────────────────────────────
   Helper: find the next upcoming Sox game from schedule data
──────────────────────────────────────────────────────────────── */
function findNextGame(schedData, today) {
  const events = schedData.events || [];
  for (const ev of events) {
    // ESPN schedule events have a date and a competitions array
    const evDateStr = ev.date ? ev.date.slice(0,10) : '';
    if (evDateStr <= today) continue;                        // skip past games
    const statusState = ev.competitions?.[0]?.status?.type?.state;
    if (statusState === 'post') continue;                    // skip finished
    const detail = ev.competitions?.[0]?.status?.type?.detail || '';
    if (/postponed|cancelled|suspended/i.test(detail)) continue;
    return ev;
  }
  return null;
}

/* ────────────────────────────────────────────────────────────────
   Helper: build "Next Game" block HTML
──────────────────────────────────────────────────────────────── */
function buildNextGameBlock(event) {
  const comp      = event.competitions?.[0];
  const awayComp  = comp?.competitors?.find(c => c.homeAway === 'away');
  const homeComp  = comp?.competitors?.find(c => c.homeAway === 'home');
  const awayName  = awayComp?.team?.shortDisplayName || awayComp?.team?.displayName || '—';
  const homeName  = homeComp?.team?.shortDisplayName || homeComp?.team?.displayName || '—';
  const isSoxHome = homeComp?.team?.abbreviation === SOX_ABBR || homeComp?.team?.id === SOX_ESPN_ID;
  const opponent  = isSoxHome ? `vs ${awayName}` : `@ ${homeName}`;

  return `<div class="mlb-next">
    <div class="mlb-next-label">Next Game</div>
    <div class="mlb-next-info">${opponent}</div>
    <div class="mlb-next-detail">${fmtGameTime(event.date)}</div>
  </div>`;
}

/* ────────────────────────────────────────────────────────────────
   Helper: render "No game" state
──────────────────────────────────────────────────────────────── */
function renderNoGame(inner, nextGame) {
  let html = `<div class="mlb-nogame">
    <div class="mlb-nogame-icon">&#9918;</div>
    <div class="mlb-nogame-text">No game today</div>
  </div>`;
  if (nextGame) {
    html += `<div style="padding:0 4px 4px">` + buildNextGameBlock(nextGame) + `</div>`;
  }
  inner.innerHTML = html;
}

/* ────────────────────────────────────────────────────────────────
   Helper: ordinal number string  (1 → "1st", 2 → "2nd", etc.)
──────────────────────────────────────────────────────────────── */
function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}
